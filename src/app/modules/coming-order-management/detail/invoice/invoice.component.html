<app-confirmation
  #deleteConfirmationComponent
  (dismissButtonClick)="delete($event)"
>
</app-confirmation>

<app-custom-modal
  [isOpen]="isModalOpen"
  [title]="modalTitle"
  [subtitle]="'INVOICE_FORM.TITLE' | translate"
  [width]="'1100px'"
  (closed)="closeModal()"
  variant="center"
  [showFooter]="false"
>
  <div class="invoice-layout">
    <!-- LEFT PANEL -->
    <div class="invoice-layout__side">
      <div class="card h-100">
        <div class="card-body">
          <!-- FILE BOX -->
          <div class="file-box">
            <span
              [inlineSVG]="'./assets/media/svg/files/pdf.svg'"
              class="svg-icon svg-icon-4x mb-4"
            ></span>

            <div class="file-box__name">
              {{ fileName || ('INVOICE_FORM.NO_FILE_SELECTED' | translate) }}
            </div>
          </div>

          <!-- INPUT -->
          <input
            #fileUpload
            type="file"
            accept="application/pdf"
            class="d-none"
            (change)="onFileChange($event)"
          />

          <!-- ACTIONS -->
          <div class="d-flex gap-3 mt-5">
            <button
              type="button"
              class="btn btn-light-primary flex-grow-1 d-flex align-items-center justify-content-center"
              (click)="fileUpload.click()"
            >
              <span
                [inlineSVG]="'./assets/media/icons/duotune/arrows/arr075.svg'"
                class="svg-icon svg-icon-3 me-2"
              ></span>

              {{
                fileName
                  ? ('CHANGE' | translate)
                  : ('UPLOAD' | translate)
              }}
            </button>

            <button
              type="button"
              class="btn btn-light-danger btn-icon"
              (click)="openDeleteModal()"
              [disabled]="!fileName"
            >
              <span
                [inlineSVG]="'./assets/media/icons/duotune/general/gen027.svg'"
                class="svg-icon svg-icon-2"
              ></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="invoice-layout__content">
      <!-- PREVIEW -->
      <div *ngIf="pdfSrc" class="card h-100">
        <div class="card-body">
          <div class="mb-4">
            <h3 class="fs-5 fw-bold mb-1">
              {{ 'INVOICE_FORM.PREVIEW' | translate }}
            </h3>

            <div class="text-muted fs-7">
              {{ 'INVOICE_FORM.PREVIEW_DESCRIPTION' | translate }}
            </div>
          </div>

          <div class="pdf-container">
            <pdf-viewer
              [src]="pdfSrc"
              [render-text]="true"
              [original-size]="true"
              [show-all]="true"
              style="width: 100%; height: 500px;"
            >
            </pdf-viewer>
          </div>
        </div>
      </div>
      <!-- EMPTY -->
      <div *ngIf="!pdfSrc" class="card h-100 empty-preview">
        <div class="card-body">
          <span
            [inlineSVG]="'./assets/media/svg/files/pdf.svg'"
            class="svg-icon svg-icon-4x mb-5"
          ></span>

          <div class="fs-4 fw-bold mb-2">
            {{ 'INVOICE_FORM.NO_PREVIEW_TITLE' | translate }}
          </div>

          <div class="text-muted fs-6">
            {{ 'INVOICE_FORM.NO_PREVIEW_DESCRIPTION' | translate }}
          </div>
        </div>
      </div>
    </div>
  </div>
</app-custom-modal>
