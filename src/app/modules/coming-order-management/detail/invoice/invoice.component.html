<app-confirmation
  #deleteConfirmationComponent
  (dismissButtonClick)="delete($event)"
>
</app-confirmation>

<app-custom-modal
  [isOpen]="isModalOpen"
  [title]="modalTitle"
  [subtitle]="'INVOICE_FORM.TITLE' | translate"
  [width]="'1100px'"
  (closed)="closeModal()"
  variant="center"
  [showFooter]="false"
>
  <div class="row g-8">

    <!-- FILE PANEL -->
    <div class="col-xl-3">
      <div class="card border border-gray-200 shadow-sm rounded-3 h-100">
        <div class="card-body p-6">

          <div
            class="d-flex flex-column align-items-center justify-content-center rounded-3 border border-gray-300 bg-light-primary min-h-250px px-6 py-10 mb-6"
          >
            <div class="mb-5">
              <span
                [inlineSVG]="'./assets/media/svg/files/pdf.svg'"
                class="svg-icon svg-icon-5x"
              ></span>
            </div>

            <div class="text-center">
              <div class="fs-6 fw-semibold text-gray-900 text-break">
                {{ fileName || ('INVOICE_FORM.NO_FILE_SELECTED' | translate) }}
              </div>
            </div>
          </div>

          <input
            #fileUpload
            type="file"
            accept="application/pdf"
            class="d-none"
            (change)="onFileChange($event)"
          />

          <div class="d-flex gap-3">
            <button
              type="button"
              class="btn btn-light-primary flex-grow-1 d-flex align-items-center justify-content-center"
              (click)="fileUpload.click()"
            >
              <span
                [inlineSVG]="'./assets/media/icons/duotune/arrows/arr075.svg'"
                class="svg-icon svg-icon-3 me-2"
              ></span>
              {{
                fileName
                  ? ('CHANGE' | translate)
                  : ('UPLOAD' | translate)
              }}
            </button>

            <button
              type="button"
              class="btn btn-light-danger btn-icon"
              (click)="openDeleteModal()"
              [disabled]="!fileName"
              title="{{ 'DELETE' | translate }}"
            >
              <span
                [inlineSVG]="'./assets/media/icons/duotune/general/gen027.svg'"
                class="svg-icon svg-icon-2"
              ></span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- PDF PREVIEW -->
    <div class="col-xl-9" *ngIf="pdfSrc">
      <div class="card border border-gray-200 shadow-sm rounded-3 h-100">
        <div class="card-body p-4">
          <div class="mb-4">
            <h3 class="fs-5 fw-bold text-gray-900 mb-1">
              {{ 'INVOICE_FORM.PREVIEW' | translate }}
            </h3>
            <div class="text-muted fs-7">
              {{ 'INVOICE_FORM.PREVIEW_DESCRIPTION' | translate }}
            </div>
          </div>

          <div class="border rounded-3 overflow-hidden bg-white">
            <pdf-viewer
              [src]="pdfSrc"
              [render-text]="true"
              [original-size]="true"
              [show-all]="true"
              style="width: 100%; height: 500px;"
            >
            </pdf-viewer>
          </div>
        </div>
      </div>
    </div>

    <!-- EMPTY PREVIEW -->
    <div class="col-xl-8" *ngIf="!pdfSrc">
      <div
        class="card border border-dashed border-gray-300 shadow-sm rounded-3 h-100"
      >
        <div
          class="card-body d-flex flex-column align-items-center justify-content-center text-center p-10 min-h-500px"
        >
          <span
            [inlineSVG]="'./assets/media/svg/files/pdf.svg'"
            class="svg-icon svg-icon-4x mb-5"
          ></span>

          <div class="fs-4 fw-bold text-gray-800 mb-2">
            {{ 'INVOICE_FORM.NO_PREVIEW_TITLE' | translate }}
          </div>

          <div class="text-muted fs-6">
            {{ 'INVOICE_FORM.NO_PREVIEW_DESCRIPTION' | translate }}
          </div>
        </div>
      </div>
    </div>

  </div>
</app-custom-modal>
