<div
  class="map-preview-drawer-backdrop"
  *ngIf="isOpen"
  (click)="close()"
></div>

<aside
  class="map-preview-drawer"
  [class.open]="isOpen"
>
  <div class="map-preview-drawer__header">
    <div class="map-preview-drawer__title">
      <i class="fa-solid fa-map-location-dot text-primary"></i>

      <span>
        {{ 'MARKETPLACE.CARD.MAP_PREVIEW' | translate }}
      </span>
    </div>

    <div class="map-preview-drawer__actions">
      <button
          type="button"
          class="btn btn-sm btn-light-danger d-flex align-items-center gap-2"
          (click)="close()"
          [attr.aria-label]="'CLOSE' | translate"
        >
          <i class="fas fa-times"></i>

          <span>
            {{ 'CLOSE' | translate }}
          </span>
        </button>
    </div>
  </div>

  <div
    class="map-preview-drawer__body"
    *ngIf="isOpen"
  >
    <app-map
      class="detail-map-preview"
      [previewWkt]="previewWkt"
      [previewMode]="true"
    >
    </app-map>
  </div>
</aside>
