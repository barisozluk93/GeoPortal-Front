<app-custom-modal
  [isOpen]="isModalOpen"
  [title]="modalTitle"
  [subtitle]="'INVOICE_FORM.PREVIEW' | translate"
  [width]="'900px'"
  (closed)="closeModal()"
  variant="center"
  [showFooter]="true"
  [submitText]="'DOWNLOAD' | translate"
  [cancelText]="'CLOSE' | translate"
  (submitted)="downloadFile()"
>
  <div class="fv-row">
    <div class="mb-6 d-flex justify-content-between align-items-center">
      <div class="fw-bold text-gray-700">
        {{ fileName }}
      </div>
    </div>
    <div class="border rounded-3 overflow-hidden bg-white">
      <pdf-viewer
        *ngIf="pdfSrc"
        [src]="pdfSrc"
        [render-text]="true"
        [original-size]="true"
        [show-all]="true"
        style="width: 100%; height: 500px;"
      >
      </pdf-viewer>
    </div>
  </div>
</app-custom-modal>
