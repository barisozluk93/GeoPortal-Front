<app-modal #modal [modalConfig]="modalConfig">
    <div class="row mb-8">
        <div class="col-xxl-12" *ngIf="pdfSrc">
            <pdf-viewer [src]="pdfSrc" [render-text]="true" [original-size]="true" [show-all]="true"
                style="border: 1px solid #F1F1F4; border-radius: 5px;width: 100%; height: 500px"></pdf-viewer>
        </div>
    </div>
</app-modal>
