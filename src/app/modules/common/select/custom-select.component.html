<div
  #trigger
  class="custom-select-trigger form-control d-flex align-items-center justify-content-between"
  [ngClass]="{
    'form-control-sm': size === 'sm',
    'form-control-lg': size === 'lg',
    'is-invalid': invalid,
    'disabled': disabled,
    'open': isOpen
  }"
  (click)="toggle($event)"
>
  <div class="d-flex align-items-center flex-grow-1 min-w-0 overflow-hidden">
    <ng-container *ngIf="multiple; else singleTemplate">
      <ng-container *ngIf="selectedItems.length > 0; else multiPlaceholder">
        <span class="custom-select-value text-truncate">
          {{ selectedItemsText }}
        </span>
      </ng-container>

      <ng-template #multiPlaceholder>
        <span class="custom-select-placeholder text-truncate">
          {{ placeholder }}
        </span>
      </ng-template>
    </ng-container>

    <ng-template #singleTemplate>
      <span *ngIf="selectedItem; else singlePlaceholder" class="custom-select-value text-truncate">
        {{ selectedItem[bindLabel] }}
      </span>

      <ng-template #singlePlaceholder>
        <span class="custom-select-placeholder text-truncate">
          {{ placeholder }}
        </span>
      </ng-template>
    </ng-template>
  </div>

  <div class="custom-select-actions d-flex align-items-center ms-2 flex-shrink-0">
    <button
      *ngIf="clearable && !disabled && ((multiple && selectedItems.length > 0) || (!multiple && selectedItem))"
      type="button"
      class="custom-select-icon-btn"
      (click)="clear($event)"
      tabindex="-1"
    >
      <i class="fa-solid fa-xmark fs-8"></i>
    </button>

    <span class="custom-select-divider"></span>

    <span class="custom-select-chevron-wrap">
      <i
        class="fa-solid fa-chevron-down fs-8 custom-select-chevron"
        [style.transform]="isOpen ? 'rotate(180deg)' : 'rotate(0deg)'"
      ></i>
    </span>
  </div>
</div>
