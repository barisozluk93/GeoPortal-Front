<div
  class="glass-modal-backdrop"
  tabindex="-1"
  *ngIf="isOpen"
  (click)="onBackdropClick($event)"
>
  <div
    class="modal-dialog"
    [ngClass]="{
      'modal-dialog-centered': variant === 'center',
      'modal-dialog-end': variant === 'right',
      'glass-modal-dialog-right': variant === 'right'
    }"
    [style.maxWidth]="variant === 'center' ? width : null"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-content glass-modal-content">

      <!-- Modal Header -->
      <div class="modal-header glass-modal-header">
        <div class="d-flex align-items-center gap-3 min-w-0">

          <div class="symbol symbol-40px glass-modal-symbol">
            <span class="symbol-label">
              <i class="fas fa-folder-open fs-2 text-primary"></i>
            </span>
          </div>

          <div class="min-w-0">
            <h3 class="fw-bold mb-1 text-truncate">
              {{ title }}
            </h3>

            <div *ngIf="subtitle" class="text-muted fs-7">
              {{ subtitle }}
            </div>
          </div>
        </div>

        <!-- Açık ve anlaşılır kapatma butonu -->
        <button
          type="button"
          class="btn btn-sm btn-light-danger d-flex align-items-center gap-2"
          (click)="close()"
          [attr.aria-label]="'CLOSE' | translate"
        >
          <i class="fas fa-times"></i>

          <span>
            {{ 'CLOSE' | translate }}
          </span>
        </button>
      </div>

      <!-- Modal Body -->
      <div class="modal-body glass-modal-body">
        <ng-content></ng-content>
      </div>

      <!-- Modal Footer -->
      <div
        class="modal-footer glass-modal-footer"
        *ngIf="showFooter"
      >
        <button
          type="button"
          class="btn btn-light"
          (click)="close()"
        >
          <i class="fas fa-times me-2"></i>
          {{ cancelText | translate }}
        </button>

        <button
          type="button"
          class="btn btn-primary"
          [disabled]="submitDisabled"
          (click)="onSubmit()"
        >
          <i class="fas fa-check me-2"></i>
          {{ submitText | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
