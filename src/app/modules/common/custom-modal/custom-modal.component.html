<ng-container *ngIf="isOpen">
  <div class="modal-backdrop fade show"></div>

  <div
    class="modal fade show d-block"
    tabindex="-1"
    role="dialog"
    aria-modal="true"
    aria-labelledby="custom-modal-title"
    (mousedown)="onBackdropClick($event)"
  >
    <div
      class="modal-dialog"
      [ngClass]="{
        'modal-dialog-centered modal-dialog-scrollable': variant === 'center',
        'custom-modal-dialog-right m-0 ms-auto h-100': variant === 'right'
      }"
      [style.--custom-modal-width]="width"
    >
      <div
        class="modal-content shadow-sm"
        [ngClass]="{
          'h-100 rounded-0 border-0': variant === 'right'
        }"
        (mousedown)="$event.stopPropagation()"
      >
        <div class="modal-header">
          <div class="custom-modal-header-content">
            <div class="symbol symbol-40px me-4 flex-shrink-0">
              <span class="symbol-label bg-light-primary">
                <i class="fa-solid fa-folder-open fs-2 text-primary"></i>
              </span>
            </div>

            <div class="custom-modal-title-wrapper">
              <h2
                id="custom-modal-title"
                class="modal-title fw-bold text-gray-900 mb-0 text-truncate"
              >
                {{ title }}
              </h2>

              <span
                *ngIf="subtitle"
                class="text-gray-500 fw-semibold fs-7 mt-1 text-truncate d-block"
              >
                {{ subtitle }}
              </span>
            </div>
          </div>

          <button
            type="button"
            class="custom-modal-close btn btn-sm btn-light-danger"
            (click)="close()"
            [attr.aria-label]="'CLOSE' | translate"
          >
            <i class="fa-solid fa-xmark custom-modal-close-icon"></i>
            <span class="custom-modal-close-text ms-2">
              {{ 'CLOSE' | translate }}
            </span>
          </button>
        </div>

        <div class="modal-body">
          <ng-content></ng-content>
        </div>

        <div *ngIf="showFooter" class="modal-footer">
          <div class="d-flex align-items-center justify-content-end gap-3 w-100">
            <button
              type="button"
              class="btn btn-light"
              (click)="close()"
            >
              <i class="fa-solid fa-xmark me-2"></i>
              {{ cancelText | translate }}
            </button>

            <button
              type="button"
              class="btn btn-primary"
              [disabled]="submitDisabled"
              (click)="onSubmit()"
            >
              <span class="indicator-label text-white">
                <i class="fa-solid fa-check me-2"></i>
                {{ submitText | translate }}
              </span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>
