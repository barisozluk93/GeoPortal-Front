<div
  class="modal fade show d-block"
  tabindex="-1"
  *ngIf="isOpen"
  (click)="onBackdropClick($event)"
>
  <div
    class="modal-dialog"
    [ngClass]="{
      'modal-dialog-centered': variant === 'center',
      'modal-dialog-end': variant === 'right'
    }"
    [style.maxWidth]="variant === 'center' ? width : null"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-content">

      <div class="modal-header border-0">
        <div class="d-flex align-items-center gap-3 min-w-0">
          <div class="symbol symbol-48px">
            <span class="symbol-label">
              <i class="ki-duotone ki-abstract-28">
                <span class="path1"></span>
                <span class="path2"></span>
              </i>
            </span>
          </div>

          <div class="min-w-0">
            <h3 class="fw-bold mb-1 text-truncate">
              {{ title }}
            </h3>

            <div *ngIf="subtitle" class="text-muted fs-7">
              {{ subtitle }}
            </div>
          </div>
        </div>

        <button
          type="button"
          class="btn btn-icon btn-sm btn-light"
          (click)="close()"
          aria-label="Close"
        >
          <i class="ki-duotone ki-cross">
            <span class="path1"></span>
            <span class="path2"></span>
          </i>
        </button>
      </div>

      <div class="modal-body">
        <ng-content></ng-content>
      </div>

      <div class="modal-footer border-0" *ngIf="showFooter">
        <button
          type="button"
          class="btn btn-light"
          (click)="close()"
        >
          {{ cancelText | translate }}
        </button>

        <button
          type="button"
          class="btn btn-primary"
          [disabled]="submitDisabled"
          (click)="onSubmit()"
        >
          {{ submitText | translate }}
        </button>
      </div>

    </div>
  </div>
</div>
