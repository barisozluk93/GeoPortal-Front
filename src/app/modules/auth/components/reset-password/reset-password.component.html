<form class="login-form" [formGroup]="resetPasswordForm" novalidate="novalidate" (ngSubmit)="submit()">
  <div class="login-card">

    <!-- HEADER -->
    <div class="login-card__header text-center">
      <div class="login-brand-wrap mb-6">
        <a (click)="onBrandClick()" class="app-auth__brand text-decoration-none" aria-label="Ana sayfaya git">
          <div class="app-auth__brand-top">
<img [src]="('LANG' | translate) === 'tr'
    ? './assets/media/logos/tusas_logo_tr.png'
    : './assets/media/logos/tusas_logo_eng.png'" alt="GeoPortal" class="w-100 app-auth__logo-img" />          </div>
        </a>
      </div>

      <h1 class="login-card__title">
        {{ 'AUTH.REGISTER.TITLE' | translate }}
      </h1>
    </div>

    <!-- ERROR -->
    <ng-container *ngIf="errorState === errorStates.HasError">
      <div class="alert alert-danger d-flex align-items-center mb-8 py-4 px-4 rounded-4">
        <i class="ki-outline ki-information-5 fs-3 me-3"></i>
        <div>{{ 'AUTH.RESET.ERROR' | translate }}</div>
      </div>
    </ng-container>

    <!-- SUCCESS -->
    <ng-container *ngIf="errorState === errorStates.NoError">
      <div class="alert alert-success d-flex align-items-center mb-8 py-4 px-4 rounded-4">
        <i class="ki-outline ki-check-circle fs-3 me-3"></i>
        <div>{{ 'AUTH.RESET.SUCCESS' | translate }}</div>
      </div>
    </ng-container>

    <!-- PASSWORD -->
    <div class="fv-row mb-7">
      <label class="form-label fw-bolder mb-2">
        {{ 'PASSWORD' | translate }}
      </label>

      <div class="input-group input-group-lg login-input-group" [ngClass]="{
          'is-invalid': resetPasswordForm.controls['password'].invalid &&
                        (resetPasswordForm.controls['password'].dirty || resetPasswordForm.controls['password'].touched)
        }">
        <span class="input-group-text">
          <i class="ki-outline ki-lock fs-4"></i>
        </span>

        <input type="password" class="form-control form-control-lg" formControlName="password" autocomplete="off"
          placeholder="••••••••" />
      </div>

      <!-- validations -->
      <ng-container *ngTemplateOutlet="formError; context:{
        control: resetPasswordForm.controls['password'],
        validation: 'required',
        message: ('AUTH.VALIDATION.PASSWORD_REQUIRED' | translate)
      }"></ng-container>

      <ng-container *ngTemplateOutlet="formError; context:{
        control: resetPasswordForm.controls['password'],
        validation: 'minlength',
        message: ('AUTH.VALIDATION.PASSWORD_MIN' | translate)
      }"></ng-container>
    </div>

    <!-- CONFIRM PASSWORD -->
    <div class="fv-row mb-7">
      <label class="form-label fw-bolder mb-2">
        {{ 'AUTH.CONFIRM_PASSWORD' | translate }}
      </label>

      <div class="input-group input-group-lg login-input-group" [ngClass]="{
          'is-invalid': resetPasswordForm.controls['cPassword'].errors &&
                        (resetPasswordForm.controls['cPassword'].dirty || resetPasswordForm.controls['cPassword'].touched)
        }">
        <span class="input-group-text">
          <i class="ki-outline ki-lock fs-4"></i>
        </span>

        <input type="password" class="form-control form-control-lg" formControlName="cPassword" autocomplete="off"
          placeholder="••••••••" />
      </div>

      <!-- required -->
      <ng-container *ngTemplateOutlet="formError; context:{
        control: resetPasswordForm.controls['cPassword'],
        validation: 'required',
        message: ('AUTH.VALIDATION.CONFIRM_PASSWORD_REQUIRED' | translate)
      }"></ng-container>

      <!-- minlength -->
      <ng-container *ngTemplateOutlet="formError; context:{
        control: resetPasswordForm.controls['cPassword'],
        validation: 'minlength',
        message: ('AUTH.VALIDATION.PASSWORD_MIN' | translate)
      }"></ng-container>

      <!-- match -->
      <div class="invalid-feedback d-block" *ngIf="resetPasswordForm.controls['cPassword'].errors?.['ConfirmPassword']">
        {{ 'AUTH.VALIDATION.PASSWORD_NOT_MATCH' | translate }}
      </div>
    </div>

    <!-- SUBMIT -->
    <div class="d-grid mb-6 mt-8">
      <button type="submit" class="btn btn-primary btn-lg login-submit" [disabled]="resetPasswordForm.invalid">
        <ng-container *ngIf="isLoading$ | async; else submitLabel">
          <span class="indicator-progress">
            {{ 'PLEASEWAIT' | translate }}
            <span class="spinner-border spinner-border-sm ms-2"></span>
          </span>
        </ng-container>

        <ng-template #submitLabel>
          {{ 'AUTH.RESET.SUBMIT' | translate }}
        </ng-template>
      </button>
    </div>

    <!-- BACK -->
    <div class="text-center">
      <a routerLink="/auth/login" class="login-link fw-bold text-primary">
        {{ 'AUTH.RESET.BACK' | translate }}
      </a>
    </div>

  </div>
</form>

<!-- Validation Template -->
<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="invalid-feedback d-block">
      {{ message }}
    </div>
  </ng-container>
</ng-template>
