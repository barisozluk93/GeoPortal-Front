<form
  class="form w-100"
  novalidate="novalidate"
  [formGroup]="resetPasswordForm"
  (ngSubmit)="submit()"
  id="kt_login_password_reset_form"
>
  <!--begin::Heading-->
  <div class="text-center mb-5 flex-grow-1 flex-lg-grow-0">
    <a routerLink="/landing/data">
      <button class="brand d-inline-flex align-items-center gap-3">
        <span class="brand-mark">G</span>
        <span class="text-start">
          <strong class="d-block">{{ 'brandTitle' | translate }}</strong>
          <small>{{ 'brandSubtitle' | translate }}</small>
        </span>
      </button>
    </a>
    <!--begin::Title-->
    <h1 class="text-white fw-bolder mb-3">
        Reset Password
    </h1>
    <!--end::Title-->

    <!--begin::Link-->
    <div class="text-white fw-semibold fs-6">
        Enter your new password with confirm to reset your password.
    </div>
    <!--end::Link-->
</div>
<!--begin::Heading-->

  <!-- begin::Alert error-->
  <ng-container *ngIf="errorState === errorStates.HasError">
    <div class="mb-lg-15 alert alert-danger">
      <div class="alert-text font-weight-bold">
        Sorry, looks like there are some errors detected, please try again.
      </div>
    </div>
  </ng-container>
  <!-- end::Alert error-->

  <ng-container *ngIf="errorState === errorStates.NoError">
    <div class="mb-10 bg-light-success p-8 rounded">
      <!--begin::Body-->
      <div class="text-success">Your password was changed successfuly.</div>
      <!--end::Body-->
    </div>
  </ng-container>

  <!--begin::Form group-->
  <div class="fv-row mb-8">
    <div class="fv-row mb-8">
      <label class="form-label fw-bolder text-white fs-6">Password</label>
      <input class="form-control bg-transparent" type="password" placeholder="Password" name="password"
        formControlName="password" autocomplete="off" [ngClass]="{
          'is-invalid': resetPasswordForm.controls['password'].invalid,
          'is-valid': resetPasswordForm.controls['password'].valid
        }" />
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'required',
          message: 'PASSWORD_REQUIRED' | translate,
          control: resetPasswordForm.controls['password']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'minlength',
          message: 'Password should have at least 3 symbols',
          control: resetPasswordForm.controls['password']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'maxLength',
          message: 'Password should have maximum 100 symbols',
          control: resetPasswordForm.controls['password']
        }"></ng-container>
    </div>
    <!--end::Form group-->
  
    <!--begin::Form group-->
    <div class="fv-row mb-8">
      <label class="form-label fw-bolder text-white fs-6">Confirm Password</label>
      <input class="form-control bg-transparent" type="password" placeholder="Confirm password" name="cPassword"
        autocomplete="off" formControlName="cPassword" [ngClass]="{
          'is-invalid': resetPasswordForm.controls['cPassword'].invalid,
          'is-valid': resetPasswordForm.controls['cPassword'].valid
        }" />
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'required',
          message: 'Confirm Password is required',
          control: resetPasswordForm.controls['cPassword']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'minlength',
          message: 'Confirm Password should have at least 3 symbols',
          control: resetPasswordForm.controls['cPassword']
        }"></ng-container>
      <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
          validation: 'maxLength',
          message: 'Confirm Password should have maximum 100 symbols',
          control: resetPasswordForm.controls['cPassword']
        }"></ng-container>
      <ng-container *ngIf="
        resetPasswordForm.controls['cPassword'].errors &&
          resetPasswordForm.controls['cPassword'].errors.ConfirmPassword
        ">
        <div class="fv-plugins-message-container">
          <div class="fv-help-block">
            {{'NOMATCH_PASSWORD' | translate}}
          </div>
        </div>
      </ng-container>
    </div>
  </div>
  <!--end::Form group-->
  <!--begin::Form group-->
  <div class="d-flex flex-wrap justify-content-center pb-lg-0">
    <button
      type="submit"
      id="kt_password_reset_submit"
      class="btn btn-primary me-4"
    >
      <span class="indicator-label">Submit</span>
      <ng-container *ngIf="isLoading$ | async">
        <span class="indicator-progress">
          Please wait...
          <span
            class="spinner-border spinner-border-sm align-middle ms-2"
          ></span>
        </span>
      </ng-container>
    </button>
    <a
      routerLink="/auth/login"
      id="kt_login_password_reset_form_cancel_button"
      class="btn btn-light"
    >
      Cancel
    </a>
  </div>
  <!--end::Form group-->
</form>
<!--end::Form-->

<ng-template
  #formError
  let-control="control"
  let-message="message"
  let-validation="validation"
>
  <ng-container
    *ngIf="control.hasError(validation) && (control.dirty || control.touched)"
  >
    <div class="fv-plugins-message-container">
      <div class="fv-help-block">
        <span role="alert">{{ message }}</span>
      </div>
    </div>
  </ng-container>
</ng-template>
