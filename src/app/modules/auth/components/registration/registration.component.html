<form
  class="login-form"
  [formGroup]="registrationForm"
  novalidate
  (ngSubmit)="submit()"
>

  <!-- HEADER (LOGIN İLE AYNI) -->
  <div class="login-header">
    <a routerLink="/landing/marketplace" class="brand-link">
      <div class="brand">
        <span class="brand-mark">G</span>
        <span class="brand-text">
          <strong>{{ 'brandTitle' | translate }}</strong>
          <small>{{ 'brandSubtitle' | translate }}</small>
        </span>
      </div>
    </a>

    <h1>{{ 'SIGN_UP' | translate }}</h1>
  </div>

  <!-- ERROR -->
  <ng-container *ngIf="errorState === errorStates.HasError">
    <div class="modern-alert">
      <div class="modern-alert-text">
        {{ 'REGISTRATION_DETAILS_INCORRECT' | translate }}
      </div>
    </div>
  </ng-container>

  <!-- SUCCESS -->
  <ng-container *ngIf="errorState === errorStates.NoError">
    <div class="modern-alert success">
      <div class="modern-alert-text">
        {{ 'REGISTRATION_SUCCESSFULLY_COMPLETED' | translate }}
      </div>
    </div>
  </ng-container>

  <!-- NAME + SURNAME -->
  <div class="form-grid">
    <div class="form-group">
      <label>{{ 'NAME' | translate }}</label>
      <input class="modern-input" type="text" formControlName="name"
        [class.invalid]="registrationForm.controls['name'].invalid && (registrationForm.controls['name'].touched || registrationForm.controls['name'].dirty)" />
    </div>

    <div class="form-group">
      <label>{{ 'SURNAME' | translate }}</label>
      <input class="modern-input" type="text" formControlName="surname"
        [class.invalid]="registrationForm.controls['surname'].invalid && (registrationForm.controls['surname'].touched || registrationForm.controls['surname'].dirty)" />
    </div>
  </div>

  <!-- EMAIL + USERNAME -->
  <div class="form-grid">
    <div class="form-group">
      <label>{{ 'EMAIL' | translate }}</label>
      <input class="modern-input" type="email" formControlName="email"
        [class.invalid]="registrationForm.controls['email'].invalid && (registrationForm.controls['email'].touched || registrationForm.controls['email'].dirty)" />
    </div>

    <div class="form-group">
      <label>{{ 'USERNAME' | translate }}</label>
      <input class="modern-input" type="text" formControlName="username"
        [class.invalid]="registrationForm.controls['username'].invalid && (registrationForm.controls['username'].touched || registrationForm.controls['username'].dirty)" />
    </div>
  </div>

  <!-- PASSWORD -->
  <div class="form-grid">
    <div class="form-group">
      <label>{{ 'PASSWORD' | translate }}</label>
      <input class="modern-input" type="password" formControlName="password"
        [class.invalid]="registrationForm.controls['password'].invalid && (registrationForm.controls['password'].touched || registrationForm.controls['password'].dirty)" />
    </div>

    <div class="form-group">
      <label>{{ 'CONFIRM_PASSWORD' | translate }}</label>
      <input class="modern-input" type="password" formControlName="cPassword"
        [class.invalid]="registrationForm.controls['cPassword'].invalid && (registrationForm.controls['cPassword'].touched || registrationForm.controls['cPassword'].dirty)" />
    </div>
  </div>

  <!-- PHONE -->
  <div class="form-group">
    <label>{{ 'PHONE' | translate }}</label>
    <input class="modern-input" type="tel" formControlName="phone"
      [class.invalid]="registrationForm.controls['phone'].invalid && (registrationForm.controls['phone'].touched || registrationForm.controls['phone'].dirty)" />
  </div>

  <!-- SUBMIT -->
  <div class="login-actions">
    <button type="submit" class="primary-btn" [disabled]="registrationForm.invalid">
      <ng-container *ngIf="(isLoading$ | async) === false">
        <span>{{ 'SUBMIT' | translate }}</span>
      </ng-container>

      <ng-container *ngIf="isLoading$ | async">
        <span class="btn-loading">
          {{ 'PLEASE_WAIT' | translate }}
        </span>
      </ng-container>
    </button>
  </div>

  <!-- FOOTER -->
  <div class="login-footer">
    <span>{{ 'ALREADY_HAVE_AN_ACCOUNT' | translate }}</span>
    <a routerLink="/auth/login" class="text-link">
      {{ 'AUTH.LOGIN.BUTTON' | translate }}
    </a>
  </div>

</form>
