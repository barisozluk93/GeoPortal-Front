<form
 class="w-100"
 [formGroup]="loginForm"
 novalidate="novalidate"
 id="kt_login_signin_form"
 (ngSubmit)="submit()"
>
 <div class="card card-flush border border-gray-300 shadow-sm p-8 p-lg-10">
 <div class="text-center mb-8">
 <div class="d-flex justify-content-center align-items-center">
 <a
 (click)="onBrandClick()"
 class="d-inline-flex align-items-center text-decoration-none cursor-pointer"
 aria-label="Ana sayfaya git"
 >
 <div class="d-inline-flex align-items-center">
 <img [src]="('LANG' | translate) === 'tr'
 ? './assets/media/logos/tusas_logo_tr.png'
 : './assets/media/logos/tusas_logo_eng.png'" alt="GeoPortal" class="h-75px mw-200px" />
 </div>
 </a>
 </div>

 <div class="mt-6">
 <h1 class="fs-2x fw-bolder text-gray-900 mb-0">
 {{ 'AUTH.LOGIN.TITLE' | translate }}
 </h1>
 </div>
 </div>

 <ng-container *ngIf="hasError">
 <div
 class="alert alert-danger d-flex align-items-center mb-8 py-4 px-4 rounded-4"
 >
 <i class="ki-outline ki-information-5 fs-3 me-3"></i>

 <div>
 {{ 'ERR_LOGIN' | translate }}
 </div>
 </div>
 </ng-container>

 <div class="fv-row mb-7">
 <label class="form-label fw-bolder mb-2">
 {{ 'EMAIL' | translate }}
 </label>

 <div
 class="input-group input-group-lg"
 [ngClass]="{
 'is-invalid':
 loginForm.controls['email'].invalid &&
 (
 loginForm.controls['email'].dirty ||
 loginForm.controls['email'].touched
 )
 }"
 >
 <span class="input-group-text">
 <i class="ki-outline ki-sms fs-4"></i>
 </span>

 <input
 type="email"
 class="form-control form-control-lg rounded-start-0" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;"
 formControlName="email"
 autocomplete="off"
 placeholder="example@email.com"
 />
 </div>

 <ng-container
 [ngTemplateOutlet]="formError"
 [ngTemplateOutletContext]="{
 validation: 'required',
 message: ('AUTH.VALIDATION.EMAIL_REQUIRED' | translate),
 control: loginForm.controls['email']
 }"
 ></ng-container>

 <ng-container
 [ngTemplateOutlet]="formError"
 [ngTemplateOutletContext]="{
 validation: 'email',
 message: ('AUTH.VALIDATION.EMAIL_INVALID' | translate),
 control: loginForm.controls['email']
 }"
 ></ng-container>
 </div>

 <div class="fv-row mb-4">
 <div class="d-flex flex-stack mb-2">
 <label class="form-label fw-bolder mb-0">
 {{ 'PASSWORD' | translate }}
 </label>

 <a
 routerLink="/auth/forgot-password"
 class="text-decoration-none fs-7 fw-bold text-primary"
 >
 {{ 'FORGOT_PASSWORD' | translate }}
 </a>
 </div>

 <div
 class="input-group input-group-lg"
 [ngClass]="{
 'is-invalid':
 loginForm.controls['password'].invalid &&
 (
 loginForm.controls['password'].dirty ||
 loginForm.controls['password'].touched
 )
 }"
 >
 <span class="input-group-text">
 <i class="ki-outline ki-lock-2 fs-4"></i>
 </span>

 <input
 type="password"
 class="form-control form-control-lg rounded-start-0" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;"
 formControlName="password"
 autocomplete="off"
 placeholder="••••••••"
 />
 </div>

 <ng-container
 [ngTemplateOutlet]="formError"
 [ngTemplateOutletContext]="{
 validation: 'required',
 message: ('AUTH.VALIDATION.PASSWORD_REQUIRED' | translate),
 control: loginForm.controls['password']
 }"
 ></ng-container>
 </div>

 <div class="d-grid mb-8 mt-8">
 <button
 type="submit"
 class="btn btn-primary btn-lg"
 [disabled]="loginForm.invalid"
 >
 <ng-container *ngIf="isLoading$ | async; else submitLabel">
 {{ 'PLEASEWAIT' | translate }}

 <span
 class="spinner-border spinner-border-sm align-middle text-white ms-2"
 ></span>
 </ng-container>

 <ng-template #submitLabel>
 {{ 'LOGIN_CONTINUE' | translate }}
 </ng-template>
 </button>
 </div>

 <div class="separator separator-content my-8">
 <span class="w-125px text-gray-500 fw-semibold fs-7">
 {{ 'AUTH.LOGIN.OR' | translate }}
 </span>
 </div>

 <div class="text-center text-gray-600 fs-6">
 {{ 'NOTMEMBERYET' | translate }}

 <a
 routerLink="/auth/registration"
 class="text-decoration-none fw-bold text-primary ms-1"
 >
 {{ 'SIGNUP' | translate }}
 </a>
 </div>
 </div>
</form>

<ng-template
 #formError
 let-control="control"
 let-message="message"
 let-validation="validation"
>
 <ng-container
 *ngIf="
 control.hasError(validation) &&
 (control.dirty || control.touched)"
 >
 <div class="invalid-feedback d-block">
 {{ message }}
 </div>
 </ng-container>
</ng-template>
