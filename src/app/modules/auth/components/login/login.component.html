<form
  class="login-form"
  [formGroup]="loginForm"
  novalidate
  id="kt_login_signin_form"
  (ngSubmit)="submit()"
>
  <div class="login-header">
    <a routerLink="/landing/marketplace" class="brand-link">
      <div class="brand">
        <span class="brand-mark">G</span>
        <span class="brand-text">
          <strong>{{ 'brandTitle' | translate }}</strong>
          <small>{{ 'brandSubtitle' | translate }}</small>
        </span>
      </div>
    </a>

    <h1>{{ 'LOG_IN' | translate }}</h1>
  </div>

  <ng-container *ngIf="hasError">
    <div class="modern-alert">
      <div class="modern-alert-text">
        The login details are incorrect
      </div>
    </div>
  </ng-container>

  <div class="form-group">
    <label>Email</label>
    <input
      class="modern-input"
      type="email"
      name="email"
      formControlName="email"
      autocomplete="off"
      [class.invalid]="loginForm.controls['email'].invalid && (loginForm.controls['email'].dirty || loginForm.controls['email'].touched)"
    />

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'required',
      message: 'Email is required',
      control: loginForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'email',
      message: 'Email is invalid',
      control: loginForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'minLength',
      message: 'Email should have at least 3 symbols',
      control: loginForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'maxLength',
      message: 'Email should have maximum 360 symbols',
      control: loginForm.controls['email']
    }"></ng-container>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input
      class="modern-input"
      type="password"
      name="password"
      autocomplete="off"
      formControlName="password"
      [class.invalid]="loginForm.controls['password'].invalid && (loginForm.controls['password'].dirty || loginForm.controls['password'].touched)"
    />

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'required',
      message: 'Password is required',
      control: loginForm.controls['password']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'minlength',
      message: 'Password should have at least 3 symbols',
      control: loginForm.controls['password']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'maxLength',
      message: 'Password should have maximum 100 symbols',
      control: loginForm.controls['password']
    }"></ng-container>
  </div>

  <div class="login-links">
    <a routerLink="/auth/forgot-password" class="text-link">
      Forgot Password ?
    </a>
  </div>

  <div class="login-actions">
    <button
      type="submit"
      id="kt_sign_in_submit"
      class="primary-btn"
      [disabled]="loginForm.invalid"
    >
      <ng-container *ngIf="isLoading$ | async; else continueTpl">
        <span class="btn-loading">
          Please wait...
          <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
        </span>
      </ng-container>

      <ng-template #continueTpl>
        <span>Continue</span>
      </ng-template>
    </button>
  </div>

  <div class="login-footer">
    <span>Not a Member yet?</span>
    <a routerLink="/auth/registration" class="text-link">
      Sign up
    </a>
  </div>
</form>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="field-error">
      <span role="alert">{{ message }}</span>
    </div>
  </ng-container>
</ng-template>
