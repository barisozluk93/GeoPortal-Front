<form
  class="login-form"
  [formGroup]="forgotPasswordForm"
  novalidate
  (ngSubmit)="submit()"
>

  <!-- HEADER -->
  <div class="login-header">
  <a routerLink="/landing/marketplace" class="brand-link">
      <div class="brand">
        <span class="brand-mark">G</span>
        <span class="brand-text">
          <strong>{{ 'brandTitle' | translate }}</strong>
          <small>{{ 'brandSubtitle' | translate }}</small>
        </span>
      </div>
    </a>

  <h1>{{ 'FORGOT_PASSWORD' | translate }}</h1>

  <p class="login-subtitle">
    {{ 'RESETPASSWORDMAIL' | translate }}
  </p>
</div>

  <!-- ERROR -->
  <ng-container *ngIf="errorState === errorStates.HasError">
    <div class="modern-alert error">
      <div class="modern-alert-text">
        Sorry, looks like there are some errors detected, please try again.
      </div>
    </div>
  </ng-container>

  <!-- SUCCESS -->
  <ng-container *ngIf="errorState === errorStates.NoError">
    <div class="modern-alert success">
      <div class="modern-alert-text">
        Sent password reset. Please check your email
      </div>
    </div>
  </ng-container>

  <!-- EMAIL -->
  <div class="form-group">
    <label>Email</label>

    <input
      class="modern-input"
      type="email"
      formControlName="email"
      autocomplete="off"
      [class.invalid]="forgotPasswordForm.controls['email'].invalid && (forgotPasswordForm.controls['email'].dirty || forgotPasswordForm.controls['email'].touched)"
    />

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'required',
      message: 'Email is required',
      control: forgotPasswordForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'email',
      message: 'Email is invalid',
      control: forgotPasswordForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'minLength',
      message: 'Email should have at least 3 symbols',
      control: forgotPasswordForm.controls['email']
    }"></ng-container>

    <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
      validation: 'maxLength',
      message: 'Email should have maximum 360 symbols',
      control: forgotPasswordForm.controls['email']
    }"></ng-container>
  </div>

  <!-- ACTIONS -->
  <div class="login-actions">
    <button
      type="submit"
      class="primary-btn"
      [disabled]="forgotPasswordForm.invalid"
    >
      <ng-container *ngIf="isLoading$ | async; else submitTpl">
        <span class="btn-loading">
          Please wait...
          <span class="spinner-border spinner-border-sm ms-2"></span>
        </span>
      </ng-container>

      <ng-template #submitTpl>
        <span>Submit</span>
      </ng-template>
    </button>
  </div>

  <!-- FOOTER -->
  <div class="login-footer">
    <a routerLink="/auth/login" class="text-link">
      Back to Login
    </a>
  </div>

</form>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
    <div class="field-error">
      <span role="alert">{{ message }}</span>
    </div>
  </ng-container>
</ng-template>
