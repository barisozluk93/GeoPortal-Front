<form class="w-100" [formGroup]="forgotPasswordForm" novalidate="novalidate" (ngSubmit)="submit()">
 <div class="card card-flush border border-gray-300 shadow-sm p-8 p-lg-10">
 <!-- HEADER -->
 <div class="text-center mb-8">
 <div class="d-flex justify-content-center align-items-center mb-6">
 <a (click)="onBrandClick()" class="d-inline-flex align-items-center text-decoration-none cursor-pointer" aria-label="Ana sayfaya git">
 <div class="d-inline-flex align-items-center">
 <img [src]="('LANG' | translate) === 'tr'
 ? './assets/media/logos/tusas_logo_tr.png'
 : './assets/media/logos/tusas_logo_eng.png'" alt="GeoPortal" class="h-40px mw-200px" />
 </div>
 </a>
 </div>

 <h1 class="fs-2x fw-bolder text-gray-900 mb-0">
 {{ 'FORGOT_PASSWORD' | translate }}
 </h1>
 </div>

 <!-- ERROR -->
 <ng-container *ngIf="errorState === errorStates.HasError">
 <div class="alert alert-danger d-flex align-items-center mb-8 py-4 px-4 rounded-4">
 <i class="ki-outline ki-information-5 fs-3 me-3"></i>

 <div>
 {{ 'AUTH.RESET.ERROR' | translate }}
 </div>
 </div>
 </ng-container>

 <!-- SUCCESS -->
 <ng-container *ngIf="errorState === errorStates.NoError">
 <div class="alert alert-success d-flex align-items-center mb-8 py-4 px-4 rounded-4">
 <i class="ki-outline ki-check-circle fs-3 me-3"></i>

 <div>
 {{ 'AUTH.RESET.SUCCESS' | translate }}
 </div>
 </div>
 </ng-container>

 <!-- EMAIL -->
 <div class="fv-row mb-7">
 <label class="form-label fw-bolder mb-2">
 {{ 'EMAIL' | translate }}
 </label>

 <div class="input-group input-group-lg" [ngClass]="{
 'is-invalid':
 forgotPasswordForm.controls['email'].invalid &&
 (
 forgotPasswordForm.controls['email'].dirty ||
 forgotPasswordForm.controls['email'].touched
 )
 }">
 <span class="input-group-text">
 <i class="ki-outline ki-sms fs-4"></i>
 </span>

 <input type="email" class="form-control form-control-lg rounded-start-0" style="border-top-left-radius: 0 !important; border-bottom-left-radius: 0 !important;" formControlName="email" autocomplete="off"
 placeholder="example@email.com" />
 </div>

 <!-- VALIDATIONS -->
 <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
 validation: 'required',
 message: ('AUTH.VALIDATION.EMAIL_REQUIRED' | translate),
 control: forgotPasswordForm.controls['email']
 }"></ng-container>

 <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
 validation: 'email',
 message: ('AUTH.VALIDATION.EMAIL_INVALID' | translate),
 control: forgotPasswordForm.controls['email']
 }"></ng-container>

 <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
 validation: 'minlength',
 message: ('AUTH.VALIDATION.EMAIL_MIN' | translate),
 control: forgotPasswordForm.controls['email']
 }"></ng-container>

 <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
 validation: 'maxlength',
 message: ('AUTH.VALIDATION.EMAIL_MAX' | translate),
 control: forgotPasswordForm.controls['email']
 }"></ng-container>
 </div>

 <!-- ACTION -->
 <div class="d-grid mb-6 mt-8">
 <button type="submit" class="btn btn-primary btn-lg" [disabled]="forgotPasswordForm.invalid">
 <ng-container *ngIf="isLoading$ | async; else submitLabel">
 {{ 'PLEASEWAIT' | translate }}

 <span class="spinner-border spinner-border-sm ms-2 text-white"></span>
 </ng-container>

 <ng-template #submitLabel>
 {{ 'AUTH.RESET.SUBMIT' | translate }}
 </ng-template>
 </button>
 </div>

 <!-- BACK -->
 <div class="text-center">
 <a routerLink="/auth/login" class="text-decoration-none fw-bold text-primary">
 {{ 'AUTH.RESET.BACK' | translate }}
 </a>
 </div>
 </div>
</form>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
 <ng-container *ngIf="
 control.hasError(validation) &&
 (control.dirty || control.touched)">
 <div class="invalid-feedback d-block">
 {{ message }}
 </div>
 </ng-container>
</ng-template>
