<app-custom-modal
  [isOpen]="isModalOpen"
  [title]="modalTitle"
  [subtitle]="'ROLE_FORM.TITLE' | translate"
  [width]="'760px'"
  variant="center"
  [showFooter]="true"
  (closed)="closeModal()"
  (submitted)="submit()"
>
  <form class="form" [formGroup]="form" novalidate>

    <div class="row g-8">

      <!-- NAME -->
      <div class="col-12">
        <div class="fv-row">
          <label class="required form-label fw-semibold fs-6 mb-2">
            {{ 'ROLE_FORM.NAME' | translate }}
          </label>

          <input
            type="text"
            class="form-control"
            formControlName="name"
            autocomplete="off"
            [placeholder]="'ROLE_FORM.NAME' | translate"
            [ngClass]="{
              'is-invalid': isInvalid('name')
            }"
          />

          <div
            *ngIf="isInvalid('name')"
            class="fv-plugins-message-container"
          >
            <div
              *ngIf="f['name'].errors?.['required']"
              class="fv-help-block text-danger"
            >
              {{ 'ROLE_FORM.REQUIRED_NAME' | translate }}
            </div>
          </div>
        </div>
      </div>

      <!-- PERMISSIONS -->
      <div class="col-12">
        <div class="fv-row">
          <label class="required form-label fw-semibold fs-6 mb-2">
            {{ 'ROLE_FORM.PERMISSIONS' | translate }}
          </label>

          <app-custom-select
            formControlName="permissions"
            [items]="permissionList"
            bindLabel="name"
            bindValue="id"
            [multiple]="true"
            [clearable]="true"
            [placeholder]="'ROLE_FORM.PERMISSIONS' | translate"
            [invalid]="isInvalid('permissions')"
          >
          </app-custom-select>

          <div
            *ngIf="isInvalid('permissions')"
            class="fv-plugins-message-container"
          >
            <div
              *ngIf="f['permissions'].errors?.['required']"
              class="fv-help-block text-danger"
            >
              {{
                ('ROLE_FORM.PERMISSIONS' | translate)
                + ' '
                + ('IS_REQUIRED' | translate)
              }}
            </div>
          </div>
        </div>
      </div>

    </div>

  </form>
</app-custom-modal>
