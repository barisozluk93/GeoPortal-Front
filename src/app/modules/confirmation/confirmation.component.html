<div #modalRoot>
  <app-custom-modal
    [isOpen]="isModalOpen"
    [title]="modalTitle"
    [subtitle]="''"
    [width]="'420px'"
    variant="center"
    [showFooter]="true"
    [submitText]="'YES' | translate"
    [cancelText]="'NO' | translate"
    (closed)="isModalOpen = false"
    (submitted)="submit()"
  >
    <div class="d-flex flex-column align-items-center text-center py-8">
      <div class="symbol symbol-70px mb-5">
        <span class="symbol-label bg-light-warning">
          <i class="fa-solid fa-triangle-exclamation fs-2x text-warning"></i>
        </span>
      </div>

      <div class="fw-bold text-gray-900 fs-4 mb-2">
        {{ modalTitle }}
      </div>

      <div class="text-gray-600 fw-semibold fs-6">
        {{ 'ARE_YOU_SURE' | translate }}
      </div>
    </div>
  </app-custom-modal>
</div>
