<div #modalRoot>
  <app-custom-modal
    [isOpen]="isModalOpen"
    [title]="modalTitle"
    [subtitle]="''"
    [width]="'400px'"
    (closed)="isModalOpen = false"
    (submitted)="submit()"
    variant="center"
    [submitText]="'YES' | translate"
    [cancelText]="'NO' | translate"
    [showFooter]="true"
  >
    <div class="text-center py-6 fs-6">
      {{ 'ARE_YOU_SURE' | translate }}
    </div>
  </app-custom-modal>
</div>
