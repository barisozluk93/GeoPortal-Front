<div
  class="layer-legend-panel"
  (click)="$event.stopPropagation()"
  (mousedown)="$event.stopPropagation()"
  (mouseup)="$event.stopPropagation()"
>
  <img
    *ngIf="legendUrl; else emptyLegend"
    class="layer-legend-panel__image"
    [src]="legendUrl"
    [alt]="layer?.name || layer?.layerName || 'Legend'"
  />

  <ng-template #emptyLegend>
    <div class="layer-legend-panel__empty">
      {{ 'MAP.LEGEND.EMPTY' | translate }}
    </div>
  </ng-template>
</div>
