<div class="d-flex flex-column w-100 h-100 min-h-0 overflow-hidden bg-body" (click)="$event.stopPropagation()">
  <div
    *ngIf="coordinateText"
    class="d-flex align-items-center flex-shrink-0 gap-2 px-4 py-2 bg-light-primary border-bottom border-primary border-opacity-25"
  >
    <span class="symbol symbol-25px flex-shrink-0">
      <span class="symbol-label bg-opacity-15">
        <i class="fa-solid fa-location-dot text-primary fs-7"></i>
      </span>
    </span>

    <span class="text-gray-600 fw-semibold fs-8 text-uppercase text-nowrap">
      {{ 'MAP.ASK.CLICKED_LOCATION' | translate }}
    </span>

    <span
      class="badge badge-primary fw-bold fs-8 text-truncate"
      [title]="coordinateText"
    >
      {{ coordinateText }}
    </span>
  </div>

  <div
    *ngIf="loading"
    class="d-flex flex-column flex-grow-1 align-items-center justify-content-center gap-3 p-10 text-center"
  >
    <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
    <span class="text-gray-700 fw-semibold fs-7">
      {{ 'MAP.ASK.LOADING' | translate }}
    </span>
  </div>

  <div
    *ngIf="!loading && footprints.length === 0"
    class="d-flex flex-column flex-grow-1 align-items-center justify-content-center gap-3 p-10 text-center"
  >
    <span class="symbol symbol-50px">
      <span class="symbol-label bg-light-primary">
        <i class="fa-regular fa-map text-primary fs-2"></i>
      </span>
    </span>

    <span class="text-gray-600 fw-semibold fs-7">
      {{ 'MAP.ASK.NO_RESULT' | translate }}
    </span>
  </div>

  <ng-container *ngIf="!loading && footprints.length > 0">
    <div class="flex-shrink-0 border-bottom  px-3 py-3">
      <ul class="nav nav-pills nav-pills-custom flex-nowrap gap-2 overflow-auto" role="tablist">
        <li
          class="nav-item flex-shrink-0"
          *ngFor="let footprint of footprints; let i = index; trackBy: trackByFootprint"
          role="presentation"
        >
          <button
            type="button"
            role="tab"
            class="nav-link btn btn-sm d-flex align-items-center flex-nowrap gap-2 px-3 py-2 border "
            [ngClass]="i === activeIndex ? 'active btn-light-primary border-primary' : 'btn-light'"
            [attr.aria-selected]="i === activeIndex"
            [title]="footprint.imageId || footprint.productName || footprint.name || ('MAP.ASK.FOOTPRINT' | translate)"
            (click)="selectTab(i)"
          >
            <span
              class="badge badge-circle fw-bold fs-8"
              [ngClass]="i === activeIndex ? 'badge-primary' : 'badge-light-primary'"
            >
              {{ i + 1 }}
            </span>

            <span class="text-truncate mw-125px fw-semibold fs-8" [ngClass]="i === activeIndex ? 'text-white' : 'text-primary'">
              {{ footprint.imageId || footprint.productName || footprint.name || ('MAP.ASK.FOOTPRINT' | translate) }}
            </span>
          </button>
        </li>
      </ul>
    </div>

    <div class="d-flex flex-column flex-grow-1 min-h-0 overflow-auto" *ngIf="activeFootprint as footprint">
      <div
        *ngIf="footprint.attributesLoading"
        class="d-flex flex-column flex-grow-1 align-items-center justify-content-center gap-3 p-10 text-center"
      >
        <span class="spinner-border spinner-border-sm text-primary" role="status"></span>
        <span class="text-gray-700 fw-semibold fs-7">Öznitelikler okunuyor...</span>
      </div>

      <div
        *ngIf="!footprint.attributesLoading && footprint.attributesError"
        class="d-flex flex-column flex-grow-1 align-items-center justify-content-center gap-3 p-10 text-center"
      >
        <span class="symbol symbol-50px">
          <span class="symbol-label bg-light-danger">
            <i class="fa-solid fa-triangle-exclamation text-danger fs-2"></i>
          </span>
        </span>

        <span class="text-danger fw-semibold fs-7">
          {{ footprint.attributesError }}
        </span>
      </div>

      <div
        *ngIf="!footprint.attributesLoading && !footprint.attributesError && activeAttributeRows.length === 0"
        class="d-flex flex-column flex-grow-1 align-items-center justify-content-center gap-3 p-10 text-center"
      >
        <span class="symbol symbol-50px">
          <span class="symbol-label bg-light-primary">
            <i class="fa-regular fa-rectangle-list text-primary fs-2"></i>
          </span>
        </span>

        <span class="text-gray-600 fw-semibold fs-7">Öznitelik bulunamadı.</span>
      </div>

      <div
        *ngIf="!footprint.attributesLoading && !footprint.attributesError && activeAttributeRows.length > 0"
        class="d-flex flex-column px-4 py-2"
      >
        <div
          class="row g-2 align-items-start py-3 border-bottom  border-bottom-dashed"
          *ngFor="let row of activeAttributeRows; let i = index; trackBy: trackByAttribute"
        >
          <div class="col-12 col-sm-5">
            <span class="d-block text-gray-600 fw-bold fs-8 text-break">
              {{ row.key }}
            </span>
          </div>

          <div class="col-12 col-sm-7">
            <span
              class="d-block text-gray-900 fw-semibold fs-8 text-break"
              [title]="formatAttributeValue(row.value)"
            >
              {{ formatAttributeValue(row.value) }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</div>
