<aside class="detail-drawer" [class.open]="open">
  <div class="detail-drawer__header">
    <div>
      <div class="detail-drawer__kicker text-primary">
        {{ 'MAP.FEATURE.TITLE' | translate }}
      </div>

      <div class="detail-drawer__title">
        {{ title || ('MAP.FEATURE.SELECTED' | translate) }}
      </div>

      <div class="detail-drawer__subtitle">
        {{ subtitle }}
      </div>
    </div>

    <button
      class="drawer-close-btn btn btn-sm btn-icon btn-light"
      type="button"
      (click)="close.emit()">
      <span
        [inlineSVG]="'./assets/media/icons/duotune/arrows/arr061.svg'"
        class="svg-icon svg-icon-2"
        aria-hidden="true">
      </span>
    </button>
  </div>

  <div class="detail-drawer__body">
    <div class="detail-section">
      <div class="detail-section__title">
        {{ 'MAP.COMMON.GENERAL_INFO' | translate }}
      </div>

      <div class="feature-info-grid" *ngIf="entries.length; else featureInfoEmpty">
        <div class="feature-info-grid__item" *ngFor="let entry of entries">
          <span>{{ entry.label }}</span>
          <strong>{{ entry.value }}</strong>
        </div>
      </div>

      <ng-template #featureInfoEmpty>
        <div class="feature-empty">
          {{ 'MAP.FEATURE.EMPTY' | translate }}
        </div>
      </ng-template>
    </div>
  </div>
</aside>
