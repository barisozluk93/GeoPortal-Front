<div class="map-page">
  <div id="mapCanvas" class="map-canvas"></div>

  <div class="map-coordinate-box">
    <div class="fw-bolder fs-5 text-nowrap">
      <i class="fa-solid fa-location-crosshairs fw-bolder fs-5 text-primary me-2"></i>
      {{ currentCoordinateText }}
    </div>

    <div class="dropdown position-relative">
      <button type="button" class="btn btn-sm btn-light-primary btn-icon"
        [attr.title]="'MAP.COORDINATE_OPTIONS.TITLE' | translate"
        [attr.aria-label]="'MAP.COORDINATE_OPTIONS.TITLE' | translate" (click)="toggleCoordinateMenu()">
        <i class="fa-solid fa-ellipsis-vertical fw-bolder fs-5"></i>
      </button>

      <ul class="dropdown-menu dropdown-menu-end map-options-menu" [class.show]="isCoordinateMenuOpen">
        <li class="menu-item px-3">
          <button type="button" class="menu-link px-3 d-flex align-items-center w-100 border-0"
            [ngClass]="{ active: coordinateFormat === 'dd' }" (click)="setCoordinateFormat('dd')">
            <span class="menu-title">{{ 'MAP.COORDINATE_OPTIONS.DECIMAL_DEGREE' | translate }}</span>
            <i *ngIf="coordinateFormat === 'dd'" class="fa-solid fa-check text-primary ms-auto"></i>
          </button>
        </li>

        <li class="menu-item px-3">
          <button type="button" class="menu-link px-3 d-flex align-items-center w-100 border-0"
            [ngClass]="{ active: coordinateFormat === 'dms' }" (click)="setCoordinateFormat('dms')">
            <span class="menu-title">{{ 'MAP.COORDINATE_OPTIONS.DEGREE_MINUTE_SECOND' | translate }}</span>
            <i *ngIf="coordinateFormat === 'dms'" class="fa-solid fa-check text-primary ms-auto"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>

  <div class="map-left-tools">
    <app-map-toolbar side="left" [measureText]="lengthMeasureText" [activeTool]="activeTool"
      (layerManagerClicked)="toggleLayerManager()" (goToCoordinateClicked)="toggleGoToCoordinatePanel()"
      (measureLengthClicked)="toggleLengthMeasure()" (resetClicked)="resetMap()" (exportClicked)="toggleExportPanel()">
    </app-map-toolbar>

    <div class="map-panels-container" *ngIf="isLayerManagerOpen">
      <app-layer-manager [layerGroups]="layerGroups" [baseMapOpacity]="baseMapOpacity"
        (baseMapOpacityChanged)="setBaseMapOpacity($event)"
        (layerVisibilityChanged)="setLayerVisibility($event.layer, $event.visible)"
        (layerOpacityChanged)="setLayerOpacity($event.layer, $event.opacity)"
        (layerFilterClicked)="openLayerFilter($event)" (layerLegendClicked)="openLayerLegend($event)"
        (layerInfoClicked)="openLayerInfo($event)"></app-layer-manager>

      <app-layer-legend-panel *ngIf="selectedLegendLayer" [layer]="selectedLegendLayer"
        (closed)="closeLayerLegend()"></app-layer-legend-panel>

      <app-layer-filter-panel *ngIf="selectedFilterLayer" [layer]="selectedFilterLayer" (closed)="closeLayerFilter()"
        (filterApplied)="applyLayerFilter($event.layer, $event.cqlFilter)"
        (filterCleared)="clearLayerFilter($event)"></app-layer-filter-panel>
    </div>

    <div class="map-layer-manager-floating" *ngIf="isGoToCoordinatePanelOpen" (mouseenter)="openGoToCoordinatePanel()">
      <app-go-to-coordinate-panel (coordinateSelected)="focusCoordinate($event)"></app-go-to-coordinate-panel>
    </div>

    <div class="map-layer-manager-floating" *ngIf="isExportPanelOpen" (mouseenter)="openExportPanel()">
      <app-map-export-panel (exportRequested)="exportMap($event)"></app-map-export-panel>
    </div>
  </div>

  <app-map-toolbar side="right" (zoomInClicked)="zoomIn()" (zoomOutClicked)="zoomOut()"></app-map-toolbar>
</div>
