<div class="map-page" [ngClass]="{ 'map-page--preview': previewMode, 'map-page--ask-mode': activeTool === 'ask' }" (click)="onMapPageClick()">
  <div id="mapCanvas" class="map-canvas"></div>

  <input #areaFileInput type="file" class="d-none" accept=".zip,.geojson,.json,.kml,.kmz"
    (change)="uploadAreaFile($event)" (cancel)="activeTool = null" />

  <div class="map-status-bar bg-body border border-gray-300 shadow-sm">
    <div class="map-coordinate-section">
      <span class="map-coordinate-text text-gray-800 fw-semibold">{{ currentCoordinateText }}</span>

      <div class="dropdown dropup position-relative">
        <button type="button" class="btn btn-sm p-0 map-coordinate-menu-btn"
          [attr.title]="'MAP.COORDINATE_OPTIONS.TITLE' | translate"
          [attr.aria-label]="'MAP.COORDINATE_OPTIONS.TITLE' | translate" (click)="toggleCoordinateMenu($event)">
          <i class="fa-solid fa-ellipsis-vertical"></i>
        </button>

        <ul class="dropdown-menu dropdown-menu-end map-options-menu" [class.show]="isCoordinateMenuOpen"
          (click)="$event.stopPropagation()">
          <li class="menu-item px-3">
            <button type="button" class="menu-link px-3 d-flex align-items-center w-100 border-0"
              [ngClass]="{ active: coordinateFormat === 'dd' }" (click)="setCoordinateFormat('dd', $event)">
              <span class="menu-title">
                {{ 'MAP.COORDINATE_OPTIONS.DECIMAL_DEGREE' | translate }}
              </span>

              <i *ngIf="coordinateFormat === 'dd'" class="fa-solid fa-check text-primary ms-auto"></i>
            </button>
          </li>

          <li class="menu-item px-3">
            <button type="button" class="menu-link px-3 d-flex align-items-center w-100 border-0"
              [ngClass]="{ active: coordinateFormat === 'dms' }" (click)="setCoordinateFormat('dms', $event)">
              <span class="menu-title">
                {{ 'MAP.COORDINATE_OPTIONS.DEGREE_MINUTE_SECOND' | translate }}
              </span>

              <i *ngIf="coordinateFormat === 'dms'" class="fa-solid fa-check text-primary ms-auto"></i>
            </button>
          </li>
        </ul>
      </div>
    </div>

    <div class="map-status-divider"></div>

    <div class="map-scale-section" aria-hidden="true">
      <div class="custom-scale-line-inner">{{ customScaleText }}</div>
    </div>
  </div>

  <div class="map-aoi-update-warning alert alert-warning d-flex align-items-center py-3 px-4 shadow-sm" *ngIf="isAoiUpdateMode || isAreaCreationMode">
    <i class="fa-solid fa-circle-info"></i>
    <span *ngIf="isAoiUpdateMode; else newAreaCreationHint">
      {{ 'MAP.SMART_FILTER.AOI_UPDATE_HINT' | translate }}
    </span>
    <ng-template #newAreaCreationHint>
      <span>
        {{ 'MAP.SMART_FILTER.AOI_NEW' | translate }}
      </span>
    </ng-template>
  </div>

  <div class="map-left-tools">
    <app-map-toolbar side="left" [measureText]="lengthMeasureText" [activeTool]="activeTool"
      (layerManagerClicked)="toggleLayerManager()" (goToCoordinateClicked)="toggleGoToCoordinatePanel()"
      (measureDistanceClicked)="toggleDistanceMeasure()" (measureAreaClicked)="toggleAreaMeasure()"
      (polygonClicked)="togglePolygonDraw()" (rectangleClicked)="toggleRectangleDraw()"
      (uploadClicked)="openUploadFilePicker()" (resetClicked)="resetMap()" (exportClicked)="toggleExportPanel()"
      (searchClicked)="toggleSearchPanel()" (askClicked)="toggleAskTool()">
    </app-map-toolbar>

    <div class="map-panels-container" *ngIf="isLayerManagerOpen">
      <app-map-panel-shell [isHeaderExist]="false" icon="fa-solid fa-layer-group" [title]="'MAP.ACTIONS.LAYER_MANAGER' | translate"
        panelClass="map-panel-shell--layer-manager" [minimized]="panelUiState.layerManager.minimized"
        [maximized]="panelUiState.layerManager.maximized" (closeClicked)="closeLayerManager()"
        (minimizeClicked)="togglePanelMinimize('layerManager')" (maximizeClicked)="togglePanelMaximize('layerManager')">
        <app-layer-manager [layers]="layers"
          (layerVisibilityChanged)="setLayerVisibility($event.layer, $event.visible)">
        </app-layer-manager>
      </app-map-panel-shell>
    </div>

    <div class="map-panels-container" *ngIf="isAskPanelOpen">
      <app-map-panel-shell [isHeaderExist]="false" icon="fa-solid fa-circle-info" [title]="'MAP.ASK.TITLE' | translate"
        panelClass="map-panel-shell--ask" [minimized]="panelUiState.ask.minimized"
        [maximized]="panelUiState.ask.maximized" (closeClicked)="closeAskPanel()"
        (minimizeClicked)="togglePanelMinimize('ask')" (maximizeClicked)="togglePanelMaximize('ask')">
        <app-map-ask-panel [loading]="isAskLoading" [coordinateText]="askCoordinateText"
          [footprints]="askFootprints" [activeIndex]="activeAskFootprintIndex"
          (tabSelected)="selectAskFootprint($event)" (zoomRequested)="zoomToAskFootprint($event)">
        </app-map-ask-panel>
      </app-map-panel-shell>
    </div>

    <div class="map-layer-manager-floating map-draggable-panel map-draggable-panel--combined-smart-filter"
      [class.map-draggable-panel--aoi-editing]="isAoiUpdateMode"
      [class.map-draggable-panel--results-collapsed]="isResultsPanelCollapsed && !isSmartProductRequestPanelOpen"
      [class.map-draggable-panel--prefilter-collapsed]="isPrefilterPanelCollapsed"
      *ngIf="isSmartPrefilterPanelOpen || isSmartFilterPanelOpen || isPrefilterPanelCollapsed || isResultsPanelCollapsed || isSmartProductRequestPanelOpen">
      <app-map-panel-shell *ngIf="!(isPrefilterPanelCollapsed && isResultsPanelCollapsed && !isSmartProductRequestPanelOpen)" icon="fa-solid fa-grip" [panelClass]="isResultsPanelCollapsed && !isSmartProductRequestPanelOpen
          ? 'map-panel-shell--combined-smart-filter map-panel-shell--results-collapsed'
          : 'map-panel-shell--combined-smart-filter'" [title]="'MAP.SMART_FILTER.TITLE' | translate"
        [minimized]="panelUiState.smartFilter.minimized" [maximized]="panelUiState.smartFilter.maximized"
        (closeClicked)="closeSmartFilterPanel()" (minimizeClicked)="togglePanelMinimize('smartFilter')"
        (maximizeClicked)="togglePanelMaximize('smartFilter')">
        <div class="combined-smart-filter-panel"
          [class.combined-smart-filter-panel--results-collapsed]="isResultsPanelCollapsed && !isSmartProductRequestPanelOpen"
          [class.combined-smart-filter-panel--prefilter-collapsed]="isPrefilterPanelCollapsed">
          <app-smart-product-prefilter-panel *ngIf="!isPrefilterPanelCollapsed" [request]="smartFilterRequest" [acquisitionDateRange]="smartAcquisitionDateRange" [loading]="isSmartFilterLoading"
            [areas]="aoiItems" [editingAreaId]="editingAoiId" [selectedAreaId]="selectedAoiId"
            [resultsCollapsed]="isResultsPanelCollapsed || isSmartProductRequestPanelOpen" (searchClicked)="applySmartProductPrefilter($event)"
            (editAreaClicked)="editAoi($event)" (removeAreaClicked)="removeAoi($event)"
            (exportAreaClicked)="exportAoi($event)" (newAreaClicked)="onSmartPrefilterNewArea($event)"
            (renameAreaClicked)="renameAoi($event)" (areaSelected)="selectAoi($event)" (areaHovered)="hoverAoi($event)"
            (resultsPanelToggled)="toggleResultsPanel()" (prefilterPanelToggled)="togglePrefilterPanel()"
            (newRequestClicked)="createNewProductRequest($event)">
          </app-smart-product-prefilter-panel>

          <button *ngIf="isPrefilterPanelCollapsed" type="button"
            class="prefilter-restore-rail btn btn-sm btn-light"
            [title]="'MAP.SMART_FILTER.PREFILTER.SHOW' | translate"
            (click)="togglePrefilterPanel(); $event.stopPropagation()">
            <i class="fa-solid fa-angles-left"></i>
            <span>{{ 'MAP.SMART_FILTER.PREFILTER.AREAS' | translate }}</span>
          </button>

          <div class="combined-smart-filter-panel__separator"
            *ngIf="!isResultsPanelCollapsed && !isPrefilterPanelCollapsed"></div>

          <app-smart-filter-panel *ngIf="!isResultsPanelCollapsed && !isSmartProductRequestPanelOpen" [results]="smartFilterResults"
            [request]="smartFilterRequest" [loading]="isSmartFilterLoading" [totalAreaM2]="totalSelectedAreaM2"
            [areaUnit]="selectedSmartFilterAreaUnit" (areaUnitChanged)="selectedSmartFilterAreaUnit = $event"
            (filterClicked)="toggleSmartAdvancedFilterPanel($event)" (createRequest)="createNewProductRequest()"
            (metadataClicked)="openSmartProductMetadata($event)"
            (zoomToExtentClicked)="zoomSmartProductToExtent($event)" (addToCartClicked)="addSmartProductToCart($event)"
            (selectedProductsChanged)="highlightSelectedSmartProducts($event)"
            (productHovered)="highlightHoveredSmartProduct($event)">
          </app-smart-filter-panel>

          <app-smart-product-request-panel *ngIf="!isResultsPanelCollapsed && isSmartProductRequestPanelOpen"
            [areaM2]="totalSelectedAreaM2" [wkt]="getAoiWkt()" [loading]="isSmartProductRequestLoading"
            (closeClicked)="closeSmartProductRequestPanel()"
            (addToCartClicked)="addSmartProductRequestToCart($event)">
          </app-smart-product-request-panel>
        </div>
      </app-map-panel-shell>

      <button
        *ngIf="isPrefilterPanelCollapsed && isResultsPanelCollapsed && !isSmartProductRequestPanelOpen"
        type="button"
        class="prefilter-restore-rail prefilter-restore-rail--standalone btn btn-sm btn-light shadow-sm"
        [title]="'MAP.SMART_FILTER.PREFILTER.SHOW' | translate"
        (click)="togglePrefilterPanel(); $event.stopPropagation()">
        <i class="fa-solid fa-angles-left"></i>
        <span>{{ 'MAP.SMART_FILTER.PREFILTER.AREAS' | translate }}</span>
      </button>

      <div *ngIf="isMetadataPanelOpen" class="smart-metadata-hover-panel card shadow-sm border border-gray-200"
        [style.top.px]="smartMetadataPanelPosition.top" [style.left.px]="smartMetadataPanelPosition.left"
        (click)="$event.stopPropagation()" (mousedown)="$event.stopPropagation()" (mouseup)="$event.stopPropagation()">
        <div class="smart-advanced-filter-hover-panel__header">
          <span class="smart-metadata-hover-panel__title">
            <i class="fa-solid fa-circle-info text-primary"></i>
            <span>{{ selectedMetadataProductName || ('MAP.SMART_FILTER.METADATA' | translate) }}</span>
          </span>
          <button type="button" class="btn btn-sm btn-light-danger py-1"
            title="{{ 'CLOSE' | translate }}" (click)="closeMetadataPanel()">
            <i class="fa-solid fa-xmark fs-8 me-2"></i>
            <span class="fs-8">{{ 'CLOSE' | translate }}</span>
          </button>
        </div>

        <app-smart-product-metadata-panel class="smart-metadata-hover-panel__content"
          [loading]="isMetadataLoading" [productName]="selectedMetadataProductName"
          [metadataRows]="metadataRows" [rawText]="metadataRawText"
          (closeClicked)="closeMetadataPanel()">
        </app-smart-product-metadata-panel>
      </div>

      <div *ngIf="isSmartAdvancedFilterPanelOpen" class="smart-advanced-filter-hover-panel card shadow-sm border border-gray-200"
        [style.top.px]="smartAdvancedFilterPosition.top" [style.left.px]="smartAdvancedFilterPosition.left"
        (click)="$event.stopPropagation()" (mousedown)="$event.stopPropagation()" (mouseup)="$event.stopPropagation()">
        <div class="smart-advanced-filter-hover-panel__header">
          <span class="smart-detail-filter-icon" aria-hidden="true">
            <i class="fa-solid fa-filter text-primary"></i>
            <i class="fa-solid fa-gear text-primary"></i>
          </span>
          <button type="button"
          class="btn btn-sm btn-light-danger py-1"
          title="{{'CLOSE' | translate }}"
          (click)="closeSmartAdvancedFilterPanel()"
          >
          <i class="fa-solid fa-xmark fs-8 me-2"></i>
          <span class="fs-8">{{'CLOSE' | translate }}</span>
          </button>
        </div>

        <app-smart-product-filter-panel [request]="smartFilterRequest" [results]="smartFilterResults"
          [loading]="isSmartFilterLoading" (filterApplied)="applySmartProductFilter($event)"
          (filterCleared)="clearSmartProductFilter()" (closeClicked)="closeSmartAdvancedFilterPanel()">
        </app-smart-product-filter-panel>
      </div>
    </div>

    <div class="map-layer-manager-floating" *ngIf="isSearchPanelOpen" (mouseenter)="openSearchPanel()">
      <app-map-panel-shell [isHeaderExist]="false" icon="fa-solid fa-search" [title]="'MAP.ACTIONS.SEARCH' | translate"
        [minimized]="panelUiState.search.minimized" [maximized]="panelUiState.search.maximized"
        (closeClicked)="closeSearchPanel()" (minimizeClicked)="togglePanelMinimize('search')"
        (maximizeClicked)="togglePanelMaximize('search')">
        <app-map-search-panel (resultSelected)="selectSearchResult($event)"></app-map-search-panel>
      </app-map-panel-shell>
    </div>

    <div class="map-layer-manager-floating" *ngIf="isGoToCoordinatePanelOpen" (mouseenter)="openGoToCoordinatePanel()">
      <app-map-panel-shell icon="" [title]="''" [minimized]="panelUiState.coordinate.minimized"
        [maximized]="panelUiState.coordinate.maximized" (closeClicked)="closeGoToCoordinatePanel()"
        (minimizeClicked)="togglePanelMinimize('coordinate')" (maximizeClicked)="togglePanelMaximize('coordinate')">
        <app-go-to-coordinate-panel (coordinateSelected)="focusCoordinate($event)">
        </app-go-to-coordinate-panel>
      </app-map-panel-shell>
    </div>

    <div class="map-layer-manager-floating" *ngIf="isExportPanelOpen" (mouseenter)="openExportPanel()">
      <app-map-panel-shell [isHeaderExist]="false" icon="fa-solid fa-print" [title]="'MAP.ACTIONS.EXPORT_IMAGE' | translate"
        [minimized]="panelUiState.export.minimized" [maximized]="panelUiState.export.maximized"
        (closeClicked)="closeExportPanel()" (minimizeClicked)="togglePanelMinimize('export')"
        (maximizeClicked)="togglePanelMaximize('export')">
        <app-map-export-panel (exportRequested)="exportMap($event)"></app-map-export-panel>
      </app-map-panel-shell>
    </div>


  </div>

  <app-map-toolbar side="right" [mapRotationDegree]="mapRotationDegree" (rotationChanged)="rotateMap($event)"
    (northResetClicked)="resetMapRotation()" (zoomInClicked)="zoomIn()" (zoomOutClicked)="zoomOut()">
  </app-map-toolbar>
</div>
