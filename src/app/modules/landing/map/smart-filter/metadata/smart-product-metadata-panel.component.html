<div
  class="d-flex flex-column h-100 min-h-0 bg-body overflow-hidden"
  (click)="$event.stopPropagation()"
  (mousedown)="$event.stopPropagation()"
  (mouseup)="$event.stopPropagation()"
>
  <div class="flex-grow-1 min-h-0 overflow-auto p-2">
    <div
      *ngIf="loading"
      class="d-flex align-items-center justify-content-center gap-2 min-h-125px text-gray-600 fs-8"
    >
      <span class="spinner-border spinner-border-sm text-primary"></span>
      <span>{{ 'MAP.SMART_FILTER.METADATA.LOADING' | translate }}</span>
    </div>

    <ng-container *ngIf="!loading">
      <div
        *ngIf="!metadataRows.length && !rawText"
        class="d-flex flex-column align-items-center justify-content-center gap-2 min-h-125px text-center text-gray-600 fs-8"
      >
        <span class="symbol symbol-40px">
          <span class="symbol-label bg-light-primary">
            <i class="fa-solid fa-file-lines text-primary fs-3"></i>
          </span>
        </span>

        <span>{{ 'MAP.SMART_FILTER.METADATA.EMPTY' | translate }}</span>
      </div>

      <div
        *ngIf="metadataRows.length"
        class="d-flex flex-column border  bg-body font-monospace fs-8"
      >
        <div
          *ngFor="let row of metadataRows"
          class="d-flex align-items-start border-bottom border-gray-200 px-2 py-1"
        >
          <div class="w-150px flex-shrink-0 pe-3 fw-bold text-gray-900 text-break">
            &lt;{{ row.key }}&gt;
          </div>

          <div class="flex-grow-1 min-w-0 text-gray-900 text-break">
            {{ row.value || '-' }}
          </div>
        </div>
      </div>

      <pre
        *ngIf="!metadataRows.length && rawText"
        class="mb-0 p-3 border  bg-light text-gray-900 fs-8 font-monospace text-break overflow-auto"
      >{{ rawText }}</pre>
    </ng-container>
  </div>
</div>
