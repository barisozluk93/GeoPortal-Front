<div
  class="smart-product-request-panel"
  (click)="$event.stopPropagation()"
  (mousedown)="$event.stopPropagation()"
  (mouseup)="$event.stopPropagation()"
>
  <div class="smart-product-request-panel__body">
    <button
      type="button"
      class="request-area-card btn btn-lg btn-light-primary w-100 request-update-aoi-btn"
      [disabled]="loading"
      (click)="updateAoiClicked.emit()"
    >
      <i class="fa-solid fa-draw-polygon me-2"></i>
      {{ 'MAP.SMART_FILTER.REQUEST_PANEL.UPDATE_AOI' | translate }}
    </button>

    <div class="request-area-card">
      <span>
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.AOI_AREA' | translate }}
      </span>

      <strong>
        {{ formattedArea }}
      </strong>
    </div>

    <div class="filter-field filter-field--full">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.IMAGE_TYPE' | translate }}
      </label>

      <app-custom-select
        [items]="imageTypes"
        bindLabel="label"
        bindValue="value"
        [multiple]="false"
        [clearable]="false"
        [(ngModel)]="product.imageType"
        [ngModelOptions]="{ standalone: true }"
      >
      </app-custom-select>

      <div
        class="invalid-feedback d-block"
        *ngIf="submitted && !product.imageType"
      >
        {{ 'MAP.EXPORT.FILE_NAME_REQUIRED' | translate }}
      </div>
    </div>

    <div class="filter-field">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.START_DATE' | translate }}
      </label>

      <input
        type="date"
        class="form-control form-control-lg"
        [class.is-invalid]="submitted && !product.acquisitionStartDate"
        [(ngModel)]="product.acquisitionStartDate"
        [ngModelOptions]="{ standalone: true }"
      />

      <div
        class="invalid-feedback d-block"
        *ngIf="submitted && !product.acquisitionStartDate"
      >
        {{ 'MAP.EXPORT.FILE_NAME_REQUIRED' | translate }}
      </div>
    </div>

    <div class="filter-field">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.END_DATE' | translate }}
      </label>

      <input
        type="date"
        class="form-control form-control-lg"
        [class.is-invalid]="submitted && !product.acquisitionEndDate"
        [(ngModel)]="product.acquisitionEndDate"
        [ngModelOptions]="{ standalone: true }"
      />

      <div
        class="invalid-feedback d-block"
        *ngIf="submitted && !product.acquisitionEndDate"
      >
        {{ 'MAP.EXPORT.FILE_NAME_REQUIRED' | translate }}
      </div>
    </div>

    <div class="filter-field">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.MAX_CLOUD_RATE' | translate }}
      </label>

      <div class="input-group input-group-lg">
        <input
          type="number"
          class="form-control"
          min="0"
          max="100"
          step="1"
          [(ngModel)]="product.cloudRate"
          [ngModelOptions]="{ standalone: true }"
        />

        <span class="input-group-text">%</span>
      </div>
    </div>

    <div class="filter-field">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.MAX_OFF_NADIR' | translate }}
      </label>

      <div class="input-group input-group-lg">
        <input
          type="number"
          class="form-control"
          min="0"
          step="0.1"
          [(ngModel)]="product.offNadirAngle"
          [ngModelOptions]="{ standalone: true }"
        />

        <span class="input-group-text">°</span>
      </div>
    </div>

    <div class="filter-field filter-field--full">
      <label class="form-label fw-bolder">
        {{ 'MAP.SMART_FILTER.REQUEST_PANEL.PROCESS_OPTIONS' | translate }}
      </label>

      <div class="process-options">
        <label class="request-checkbox">
          <input
            type="checkbox"
            class="request-check-input"
            [(ngModel)]="product.isOrthorectified"
            [ngModelOptions]="{ standalone: true }"
          />

          <span class="request-check-mark"></span>

          <span class="request-checkbox-label">
            {{ 'MAP.SMART_FILTER.REQUEST_PANEL.ORTHORECTIFICATION' | translate }}
          </span>
        </label>

        <label class="request-checkbox">
          <input
            type="checkbox"
            class="request-check-input"
            [(ngModel)]="product.isPansharpened"
            [ngModelOptions]="{ standalone: true }"
          />

          <span class="request-check-mark"></span>

          <span class="request-checkbox-label">
            {{ 'MAP.SMART_FILTER.REQUEST_PANEL.PANSHARPEN' | translate }}
          </span>
        </label>
      </div>

      <div
        class="invalid-feedback d-block"
        *ngIf="
          submitted &&
          !product.isOrthorectified &&
          !product.isPansharpened
        "
      >
        {{ 'MAP.EXPORT.FILE_NAME_REQUIRED' | translate }}
      </div>
    </div>
  </div>

  <div class="smart-product-request-panel__footer">
    <button
      type="button"
      class="btn btn-lg btn-primary w-100"
      [disabled]="loading"
      (click)="addToCart()"
    >
      <span
        *ngIf="loading"
        class="spinner-border spinner-border-sm me-2"
      ></span>

      <i
        *ngIf="!loading"
        class="fa-solid fa-cart-plus me-2"
      ></i>

      {{ 'MAP.SMART_FILTER.REQUEST_PANEL.ADD_TO_CART' | translate }}
    </button>
  </div>
</div>
