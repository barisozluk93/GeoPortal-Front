<div class="map-toolbar-wrapper" [ngClass]="{
    'toolbar-left': side === 'left',
    'toolbar-right': side === 'right'
  }">
  <ng-container *ngIf="side === 'left'">
    <div class="left-map-toolbar d-flex flex-column" role="group">
      <button type="button" class="btn btn-icon btn-light map-action-btn"
        [ngClass]="{ 'map-action-btn--active': activeTool === 'layer-manager' }"
        [title]="'MAP.ACTIONS.LAYER_MANAGER' | translate" (mouseenter)="layerManagerHovered.emit()"
        (click)="layerManagerClicked.emit()">
        <i class="fa-solid fa-layer-group fs-2"></i>
      </button>

      <button type="button" class="btn btn-icon btn-light map-action-btn mobile-hidden-action"
        [ngClass]="{ 'map-action-btn--active': activeTool === 'search' }" [title]="'MAP.ACTIONS.SEARCH' | translate"
        (click)="searchClicked.emit()">
        <i class="fa-solid fa-search fs-2"></i>
      </button>

      <button type="button" class="btn btn-icon btn-light map-action-btn"
        [ngClass]="{ 'map-action-btn--active': activeTool === 'ask' }"
        [title]="'MAP.ACTIONS.ASK' | translate"
        [attr.aria-label]="'MAP.ACTIONS.ASK' | translate"
        (click)="askClicked.emit()">
        <i class="fa-solid fa-circle-info fs-2"></i>
      </button>

      <div class="map-action-dropdown mobile-hidden-action">

        <button type="button" class="btn btn-icon btn-light map-action-btn" [ngClass]="{
    'map-action-btn--active':
      activeTool === 'polygon' ||
      activeTool === 'rectangle' ||
      activeTool === 'upload'
  }" [title]="'MAP.ACTIONS.AREA_TOOLS' | translate">
          <svg class="map-action-icon" viewBox="0 0 24 24" aria-hidden="true" style="font-size: 1.5rem !important;">
            <path fill="currentColor" d="M12 2.5L21 9L17.5 20H6.5L3 9L12 2.5Z" />
          </svg>
        </button>

        <div class="map-action-dropdown__menu">
          <button type="button" class="btn btn-icon btn-light map-action-btn"
            [title]="'MAP.ACTIONS.POLYGON' | translate" (click)="polygonClicked.emit()">
            <i class="fa-solid fa-pen fs-2"></i>
          </button>

          <button type="button" class="btn btn-icon btn-light map-action-btn"
            [title]="'MAP.ACTIONS.RECTANGLE' | translate" (click)="rectangleClicked.emit()">
            <i class="fa-regular fa-square fs-2"></i>
          </button>

          <button type="button" class="btn btn-icon btn-light map-action-btn"
            [title]="'MAP.ACTIONS.UPLOAD_FILE' | translate" (click)="uploadClicked.emit()">
            <i class="fa-solid fa-upload fs-2"></i>
          </button>
        </div>
      </div>

      <div class="map-action-dropdown">
        <button type="button"
          class="btn btn-icon btn-light map-action-btn"
          [ngClass]="{ 'map-action-btn--active': activeTool === 'measure' }"
          [title]="'MAP.ACTIONS.MEASUREMENT' | translate">
          <i class="fa-solid fa-ruler-combined fs-2 text-primary"></i>
        </button>

        <div class="map-action-dropdown__menu">
          <button type="button"
            class="btn btn-icon btn-light map-action-btn"
            [title]="'MAP.ACTIONS.MEASURE_LENGTH' | translate"
            (click)="measureDistanceClicked.emit()">
            <svg class="measure-tool-icon" viewBox="0 0 24 24" aria-hidden="true">
              <polyline points="3,17 8,12 13,15 21,7"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round"></polyline>
              <circle cx="3" cy="17" r="1.6" fill="currentColor"></circle>
              <circle cx="8" cy="12" r="1.6" fill="currentColor"></circle>
              <circle cx="13" cy="15" r="1.6" fill="currentColor"></circle>
              <circle cx="21" cy="7" r="1.6" fill="currentColor"></circle>
            </svg>
          </button>

          <button type="button"
            class="btn btn-icon btn-light map-action-btn"
            [title]="'MAP.ACTIONS.MEASURE_AREA' | translate"
            (click)="measureAreaClicked.emit()">
            <svg class="measure-tool-icon" viewBox="0 0 24 24" aria-hidden="true">
              <polygon points="5,5 19,7 17,18 7,19"
                fill="none" stroke="currentColor" stroke-width="2"
                stroke-linejoin="round"></polygon>
              <circle cx="5" cy="5" r="1.6" fill="currentColor"></circle>
              <circle cx="19" cy="7" r="1.6" fill="currentColor"></circle>
              <circle cx="17" cy="18" r="1.6" fill="currentColor"></circle>
              <circle cx="7" cy="19" r="1.6" fill="currentColor"></circle>
            </svg>
          </button>
        </div>
      </div>

      <!-- <button type="button" class="btn btn-icon btn-light map-action-btn"
        [ngClass]="{ 'map-action-btn--active': activeTool === 'coordinate' }"
        [title]="'MAP.ACTIONS.GOTO_COORDINATE' | translate" (mouseenter)="goToCoordinateHovered.emit()"
        (click)="goToCoordinateClicked.emit()">
        <i class="fa-solid fa-location-crosshairs fs-2"></i>
      </button> -->

      <button type="button" class="btn btn-icon btn-light map-action-btn"
        [ngClass]="{ 'map-action-btn--active': activeTool === 'export' }"
        [title]="'MAP.ACTIONS.EXPORT_IMAGE' | translate" (click)="exportClicked.emit()">
        <i class="fa-solid fa-print fs-2"></i>
      </button>

      <button type="button" class="btn btn-icon btn-light map-action-btn"
        [title]="'MAP.ACTIONS.RESET' | translate" (click)="resetClicked.emit()">
        <i class="fa-solid fa-arrows-rotate fs-2"></i>
      </button>
    </div>
  </ng-container>

  <ng-container *ngIf="side === 'right'">
    <div class="map-navigation-control d-flex flex-column align-items-center">
      <div class="compass-control compass-control--stacked">
        <div *ngIf="isCompassOpen"
          class="compass-popover compass-popover--compact"
          [class.compass-popover--dragging]="isCompassDragging"
          (click)="$event.stopPropagation()">
          <button #compassElement
            type="button"
            class="rotation-compass rotation-compass--compact"
            [attr.aria-label]="'MAP.ACTIONS.ROTATE_MAP' | translate"
            (pointerdown)="onCompassPointerDown($event)"
            (keydown)="onCompassKeyDown($event)">
            <span class="rotation-compass__ticks" aria-hidden="true"></span>

            <span class="rotation-compass__north"
              [style.transform]="compassNeedleTransform"
              aria-hidden="true">
              <i class="fa-solid fa-caret-up rotation-compass__needle"></i>
              <span class="rotation-compass__north-label">N</span>
            </span>

            <span class="rotation-compass__degree">
              {{ normalizedRotationDegree | number:'1.0-0' }}°
            </span>
          </button>
        </div>

        <div class="compass-stack" role="group">
          <button type="button"
            class="compass-stack__button compass-stack__button--rotate btn btn-icon btn-light"
            [class.compass-stack__button--active]="isCompassOpen"
            [attr.aria-expanded]="isCompassOpen"
            [attr.aria-label]="'MAP.ACTIONS.ROTATE_MAP' | translate"
            [title]="'MAP.ACTIONS.ROTATE_MAP' | translate"
            (click)="toggleCompass($event)">
            <span class="rotate-north-icon" aria-hidden="true">
              <i class="fa-solid fa-rotate-right rotate-north-icon__arrow text-primary"></i>
              <span class="rotate-north-icon__label text-primary">N</span>
            </span>
          </button>

          <button type="button"
            class="compass-stack__button compass-stack__button--north btn btn-icon btn-light"
            [attr.aria-label]="'MAP.ACTIONS.NORTH' | translate"
            [title]="'MAP.ACTIONS.NORTH' | translate"
            (click)="resetNorth($event)">
            <span class="north-reset-icon" aria-hidden="true">
              <i class="fa-solid fa-caret-up north-reset-icon__arrow text-primary"></i>
              <span class="north-reset-icon__label text-primary">N</span>
            </span>
          </button>
        </div>
      </div>

      <div class="zoom-toolbar" role="group">
        <button type="button" class="zoom-btn btn btn-icon btn-light" [title]="'MAP.ACTIONS.ZOOM_IN' | translate"
          (click)="zoomInClicked.emit()">
          <i class="fa-solid fa-plus"></i>
        </button>

        <button type="button" class="zoom-btn btn btn-icon btn-light" [title]="'MAP.ACTIONS.ZOOM_OUT' | translate"
          (click)="zoomOutClicked.emit()">
          <i class="fa-solid fa-minus"></i>
        </button>
      </div>
    </div>
  </ng-container>
</div>
