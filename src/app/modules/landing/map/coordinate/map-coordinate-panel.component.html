<aside class="detail-drawer" [class.open]="open">
  <div class="detail-drawer__header">
    <div>
      <div class="detail-drawer__kicker text-primary">
        {{ 'MAP.COORDINATE_PANEL.KICKER' | translate }}
      </div>

      <div class="detail-drawer__title">
        {{ 'MAP.COORDINATE_PANEL.TITLE' | translate }}
      </div>

      <div class="detail-drawer__subtitle">
        {{ 'MAP.COORDINATE_PANEL.SUBTITLE' | translate }}
      </div>
    </div>

    <button class="drawer-close-btn btn btn-sm btn-icon btn-light" type="button" (click)="closeClick.emit()">
      <span
        [inlineSVG]="'./assets/media/icons/duotune/arrows/arr061.svg'"
        class="svg-icon svg-icon-2"
        aria-hidden="true">
      </span>
    </button>
  </div>

  <div class="detail-drawer__body">
    <div class="detail-section">
      <div class="coordinate-form-grid">
        <div class="coordinate-field">
          <label class="filter-label-mini">
            {{ 'MAP.COORDINATE_PANEL.LATITUDE' | translate }}
          </label>

          <input
            type="number"
            step="0.000001"
            class="form-control form-control-lg"
            [value]="lat"
            (input)="onLatInput($event)"
            [placeholder]="'MAP.COORDINATE_PANEL.LATITUDE_PLACEHOLDER' | translate" />

          <div class="coordinate-helper-text">
            {{ 'MAP.COORDINATE_PANEL.LATITUDE_HELP' | translate }}
          </div>
        </div>

        <div class="coordinate-field">
          <label class="filter-label-mini">
            {{ 'MAP.COORDINATE_PANEL.LONGITUDE' | translate }}
          </label>

          <input
            type="number"
            step="0.000001"
            class="form-control form-control-lg"
            [value]="lon"
            (input)="onLonInput($event)"
            [placeholder]="'MAP.COORDINATE_PANEL.LONGITUDE_PLACEHOLDER' | translate" />

          <div class="coordinate-helper-text">
            {{ 'MAP.COORDINATE_PANEL.LONGITUDE_HELP' | translate }}
          </div>
        </div>
      </div>
    </div>

    <div class="detail-section" style="float: right;">

      <div class="coordinate-panel-toolbar">
        <button class="btn btn-light" type="button" (click)="useCurrentClick.emit()">
          {{ 'MAP.COORDINATE_PANEL.USE_CURRENT' | translate }}
        </button>

        <button class="btn btn-primary" type="button" (click)="goClick.emit()">
          {{ 'MAP.COORDINATE_PANEL.GO' | translate }}
        </button>
      </div>
    </div>
  </div>
</aside>
