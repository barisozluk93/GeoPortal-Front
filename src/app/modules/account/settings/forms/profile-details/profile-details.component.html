<div class="glass-card profile-card" *ngIf="user">
  <div class="profile-header">
    <h3>{{ 'PROFILE_DETAILS' | translate }}</h3>
  </div>

  <form [formGroup]="form" class="profile-form">
    <div class="profile-body">
      <!-- AVATAR -->
      <div class="profile-row avatar-row">
        <div class="profile-label">Avatar</div>

        <div class="profile-avatar-section">
          <div class="profile-avatar">
            <img *ngIf="user.fileId" [src]="user?.fileResult?.fileContents" />
            <img *ngIf="!user.fileId" src="./assets/media/avatars/blank.png" />
          </div>

          <input
            type="file"
            hidden
            accept="image/*"
            (change)="onFileChange($event)"
            #fileUpload
          />

          <button type="button" class="btn-secondary" (click)="fileUpload.click()">
            {{ user.fileId ? ('CHANGE' | translate) : ('UPLOAD' | translate) }}
          </button>
        </div>
      </div>

      <!-- NAME -->
      <div class="profile-row">
        <div class="profile-label">{{ 'FULL_NAME' | translate }}</div>

        <div class="profile-fields two">
          <div class="field">
            <input
              type="text"
              formControlName="name"
              placeholder="{{ 'FIRST_NAME' | translate }}"
              [class.invalid]="isInvalid('name')"
            />
            <span class="error" *ngIf="isInvalid('name')">
              {{ 'NAME_REQUIRED' | translate }}
            </span>
          </div>

          <div class="field">
            <input
              type="text"
              formControlName="surname"
              placeholder="{{ 'LAST_NAME' | translate }}"
              [class.invalid]="isInvalid('surname')"
            />
            <span class="error" *ngIf="isInvalid('surname')">
              {{ 'SURNAME_REQUIRED' | translate }}
            </span>
          </div>
        </div>
      </div>

      <!-- USERNAME -->
      <div class="profile-row">
        <div class="profile-label">{{ 'USERNAME' | translate }}</div>

        <div class="profile-fields">
          <div class="field">
            <input
              type="text"
              placeholder="{{ 'USERNAME' | translate }}"
              formControlName="username"
              [class.invalid]="isInvalid('username')"
            />
            <span class="error" *ngIf="isInvalid('username')">
              {{ 'USERNAME_REQUIRED' | translate }}
            </span>
          </div>
        </div>
      </div>

      <!-- PHONE -->
      <div class="profile-row">
        <div class="profile-label">{{ 'CONTRACT_PHONE' | translate }}</div>

        <div class="profile-fields">
          <div class="field">
            <input
              type="tel"
              placeholder="{{ 'PHONE' | translate }}"
              formControlName="phone"
              [class.invalid]="isInvalid('phone')"
            />
            <span class="error" *ngIf="isInvalid('phone')">
              {{ 'PHONE_REQUIRED' | translate }}
            </span>
          </div>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <button type="button" class="btn-primary" (click)="saveSettings()">
        {{ 'SAVE_CHANGES' | translate }}
      </button>
    </div>
  </form>
</div>
