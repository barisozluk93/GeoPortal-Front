<div class="account-page">
  <div class="account-container">
    <div class="account-grid">

      <!-- TEK KOLON -->
      <div class="account-main">
        <div class="glass-card account-profile-card" *ngIf="userData">
          <div class="account-header">
            <h3>{{ 'PROFILE' | translate }}</h3>
          </div>

          <div class="account-body">
            <div class="account-top">
              <div class="account-avatar">
                <img [src]="profileImage" alt="profile-image" />
                <span class="account-avatar-status"></span>
              </div>

              <div class="account-user-info">
                <div class="account-user-name-row">
                  <div class="account-user-name">
                    {{ fullName }}
                  </div>

                  <div class="account-user-badge">
                    <app-keenicon name="verify" class="fs-3 text-primary"></app-keenicon>
                  </div>
                </div>

                <div class="account-user-email">
                  <app-keenicon name="geolocation" class="fs-5 me-2"></app-keenicon>
                  <span>{{ user?.email }}</span>
                </div>
              </div>
            </div>

            <div class="account-nav-wrap">
              <div class="account-nav-list">
                <a
                  class="account-nav-item"
                  routerLink="/profile/settings"
                  routerLinkActive="active"
                >
                  {{ 'PROFILE' | translate }}
                </a>

                <a
                  class="account-nav-item"
                  routerLink="/profile/addresses"
                  routerLinkActive="active"
                >
                  {{ 'MYADDRESSES' | translate }}
                </a>
              </div>
            </div>
          </div>
        </div>

        <!-- CONTENT -->
        <div class="glass-card account-content-card">
          <div class="account-content-body">
            <router-outlet></router-outlet>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
