<div class="account-page" *ngIf="userData">
  <div class="account-hero card border-0">
    <div class="card-body py-5 px-5">
      <div class="d-flex flex-wrap align-items-center gap-4">
        <div class="symbol symbol-70px symbol-lg-85px symbol-circle account-avatar">
          <img *ngIf="!userData?.fileId" src="./assets/media/avatars/blank.png" alt="Avatar" />
          <img *ngIf="userData?.fileId" [src]="userData?.fileResult?.fileContents" alt="Avatar" />

          <span class="account-avatar__status"></span>

          <button type="button" class="account-avatar__edit" (click)="fileUpload.click()">
            <i class="ki-outline ki-picture fs-2"></i>
          </button>

          <input type="file" hidden accept="image/*" (change)="onFileChange($event)" #fileUpload />
        </div>

        <div class="flex-grow-1">
          <div class="d-flex align-items-center gap-2 mb-1">
            <h1 class="fs-2 fw-bold text-gray-900 mb-0">
              {{ user?.name }} {{ user?.surname }}
            </h1>
            <app-keenicon name="verify" class="fs-4 text-primary"></app-keenicon>
          </div>

          <div class="d-flex align-items-center text-gray-500 fs-6">
            <app-keenicon name="sms" class="fs-5 me-2"></app-keenicon>
            {{ user?.email }}
          </div>
        </div>
      </div>

      <div class="account-tabs mt-5">
        <ul class="nav nav-pills gap-2">
          <li class="nav-item">
            <a
              class="nav-link fw-semibold"
              routerLink="/profile/settings"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
            >
              <app-keenicon name="user" class="fs-5 me-2"></app-keenicon>
              {{ 'PROFILE' | translate }}
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link fw-semibold" routerLink="/profile/addresses" routerLinkActive="active">
              <app-keenicon name="geolocation" class="fs-5 me-2"></app-keenicon>
              {{ 'MYADDRESSES' | translate }}
            </a>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <div class="account-content">
    <router-outlet></router-outlet>
  </div>
</div>
