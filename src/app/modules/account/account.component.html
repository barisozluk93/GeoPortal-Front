<div class="card border-0 shadow-sm rounded-3 mb-5" *ngIf="userData">
  <!-- HEADER -->
  <div class="card-body d-flex flex-wrap align-items-center justify-content-between gap-4 py-5">
    <!-- LEFT -->
    <div class="d-flex align-items-center gap-4">
      <!-- Avatar -->
      <div class="symbol symbol-80px symbol-lg-100px symbol-circle position-relative">
        <img *ngIf="!userData?.fileId" src="./assets/media/avatars/blank.png" />
        <img *ngIf="userData?.fileId" [src]="userData?.fileResult?.fileContents" />
        <!-- status -->
        <span
          class="position-absolute bottom-0 end-0 translate-middle p-1 bg-success border border-3 border-white rounded-circle"></span>
        <button type="button" class="avatar-edit-btn" (click)="fileUpload.click()">
          <i class="ki-outline ki-picture fs-2 text-white"></i>
        </button>
        <!-- hidden input -->
        <input type="file" hidden accept="image/*" (change)="onFileChange($event)" #fileUpload />
      </div>
      <!-- Info -->
      <div class="d-flex flex-column">
        <div class="d-flex align-items-center gap-2 mb-1">
          <span class="text-gray-900 fs-3 fw-bold">
            {{ user?.name }} {{ user?.surname }}
          </span>
          <app-keenicon name="verify" class="fs-5 text-primary"></app-keenicon>
        </div>
        <div class="d-flex align-items-center text-gray-500 fs-6">
          <app-keenicon name="sms" class="fs-5 me-2"></app-keenicon>
          {{ user?.email }}
        </div>
      </div>
    </div>
  </div>
  <!-- TABS -->
  <div class="px-5 pb-5">
    <ul class="nav nav-pills gap-2">
      <li class="nav-item">
        <a class="nav-link px-4 py-2 fw-semibold" routerLink="/profile/settings" routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          {{ 'PROFILE' | translate }}
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link px-4 py-2 fw-semibold" routerLink="/profile/addresses" routerLinkActive="active">
          {{ 'MYADDRESSES' | translate }}
        </a>
      </li>
    </ul>
  </div>
</div>

<!-- CONTENT -->
<router-outlet></router-outlet>
