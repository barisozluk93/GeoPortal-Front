<div class="bg-body py-10">
  <div class="container-fluid">
    <div *ngIf="userData" class="d-flex flex-column gap-6">
      <div class="card border shadow-sm">
        <div class="card-body p-6 p-lg-8">
          <div class="d-flex flex-wrap align-items-center gap-6">
            <div class="image-input image-input-outline image-input-circle" data-kt-image-input="true">
              <div class="image-input-wrapper w-70px h-70px w-lg-85px h-lg-85px" [style.background-image]="
              userData?.fileId
                ? 'url(' + userData?.fileResult?.fileContents + ')'
                : 'url(./assets/media/avatars/blank.png)'
            "></div>

              <label
                class="btn btn-icon btn-circle btn-active-color-primary w-25px h-25px bg-body shadow position-absolute translate-middle top-0 start-100"
                data-kt-image-input-action="change" data-bs-toggle="tooltip" title="Change avatar">
                <i class="ki-outline ki-pencil fs-7 text-primary"></i>
                <input type="file" class="d-none" accept="image/*" (change)="onFileChange($event)" />
              </label>

              <span
                class="position-absolute bottom-0 end-0 translate-middle p-1 bg-success border border-2 border-body rounded-circle"></span>
            </div>

            <div class="flex-grow-1">
              <div class="d-flex align-items-center gap-2 mb-2">
                <h1 class="fs-2 fw-bold text-gray-900 mb-0">
                  {{ user?.name }} {{ user?.surname }}
                </h1>
                <i class="ki-outline ki-verify fs-4 text-primary"></i>
              </div>

              <div class="d-flex align-items-center text-gray-600 fs-6">
                <i class="ki-outline ki-sms fs-5 me-2 text-primary"></i>
                {{ user?.email }}
              </div>
            </div>
          </div>

          <div class="separator separator-dashed my-6"></div>

          <ul class="nav nav-pills nav-pills-custom gap-3 flex-wrap">
            <li class="nav-item">
              <a class="nav-link btn btn-flex btn-active-light-primary fw-semibold px-5 py-3"
                routerLink="/profile/settings" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
                <i class="ki-outline ki-user fs-5 me-2 text-primary"></i>
                {{ 'PROFILE' | translate }}
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link btn btn-flex btn-active-light-primary fw-semibold px-5 py-3"
                routerLink="/profile/addresses" routerLinkActive="active">
                <i class="ki-outline ki-geolocation fs-5 me-2 text-primary"></i>
                {{ 'MYADDRESSES' | translate }}
              </a>
            </li>
          </ul>
        </div>
      </div>

      <div class="d-flex flex-column gap-6">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
</div>
