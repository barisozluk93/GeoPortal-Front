<div class="card card-flush mb-8">
  <div class="card-header border-0 pt-6">
    <div class="card-title">
      <div class="d-flex flex-wrap align-items-center gap-2">
        <button
          *ngFor="let range of quickRanges"
          type="button"
          class="btn btn-sm"
          [ngClass]="activeRange === range.value ? 'btn-primary' : 'btn-light-primary'"
          (click)="onQuickRange(range.value)"
        >
          {{ range.label | translate }}
        </button>
      </div>
    </div>

    <div class="card-toolbar">
      <div class="d-flex align-items-center text-muted fw-semibold fs-7">
        <span class="bullet bullet-dot bg-success me-2"></span>
        {{ 'DASHBOARD.FILTER.LIVE_VIEW' | translate }}
      </div>
    </div>
  </div>

  <div class="card-body pt-4">
    <div class="separator separator-dashed mb-6"></div>

    <div class="row g-5 align-items-end">
      <div class="col-12 col-md-6 col-xl-3">
        <label class="form-label fs-7 fw-bold text-gray-700">{{ 'DASHBOARD.FILTER.START_DATE' | translate }}</label>
        <input type="date" class="form-control" [(ngModel)]="filters.startDate"
          [max]="getMaxStartDate()" (ngModelChange)="onStartDateChange($event)" />
      </div>

      <div class="col-12 col-md-6 col-xl-3">
        <label class="form-label fs-7 fw-bold text-gray-700">{{ 'DASHBOARD.FILTER.END_DATE' | translate }}</label>
        <input type="date" class="form-control" [(ngModel)]="filters.endDate"
          [min]="getMinEndDate()" (ngModelChange)="onEndDateChange($event)" />
      </div>

      <div class="col-12 col-md-6 col-xl-2">
        <label class="form-label fs-7 fw-bold text-gray-700">{{ 'DASHBOARD.FILTER.CUSTOMER_TYPE' | translate }}</label>
        <app-custom-select [items]="customerTypeItems" bindLabel="label" bindValue="value" [clearable]="true"
          [placeholder]="'DASHBOARD.FILTER.SELECT' | translate" [(ngModel)]="filters.customerType">
        </app-custom-select>
      </div>

      <div class="col-12 col-md-6 col-xl-2">
        <label class="form-label fs-7 fw-bold text-gray-700">{{ 'DASHBOARD.FILTER.CHANNEL' | translate }}</label>
        <app-custom-select [items]="channelItems" bindLabel="label" bindValue="value" [clearable]="true"
          [placeholder]="'DASHBOARD.FILTER.SELECT' | translate" [(ngModel)]="filters.channel">
        </app-custom-select>
      </div>

      <div class="col-12 col-xl-2">
        <div class="d-flex gap-3">
          <button class="btn btn-primary flex-fill" type="button" (click)="onFilter()">
            <i class="ki-duotone ki-filter fs-4 me-1"></i>
            {{ 'DASHBOARD.FILTER.APPLY' | translate }}
          </button>
          <button class="btn btn-light flex-fill" type="button" (click)="onReset()">
            <i class="ki-duotone ki-arrows-circle fs-4 me-1"></i>
            {{ 'DASHBOARD.FILTER.RESET' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
