<div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-6">
  <div class="d-flex flex-wrap gap-2">
    <span
      class="badge badge-light-primary cursor-pointer px-4 py-2"
      [class.active]="activeRange === '7d'"
      (click)="onQuickRange('7d')"
    >
      {{ 'DASHBOARD.FILTER.QUICK_LAST_7_DAYS' | translate }}
    </span>

    <span
      class="badge badge-light-primary cursor-pointer px-4 py-2"
      [class.active]="activeRange === '30d'"
      (click)="onQuickRange('30d')"
    >
      {{ 'DASHBOARD.FILTER.QUICK_LAST_30_DAYS' | translate }}
    </span>

    <span
      class="badge badge-light-primary cursor-pointer px-4 py-2"
      [class.active]="activeRange === '3m'"
      (click)="onQuickRange('3m')"
    >
      {{ 'DASHBOARD.FILTER.QUICK_LAST_3_MONTHS' | translate }}
    </span>

    <span
      class="badge badge-light-primary cursor-pointer px-4 py-2"
      [class.active]="activeRange === '6m'"
      (click)="onQuickRange('6m')"
    >
      {{ 'DASHBOARD.FILTER.QUICK_LAST_6_MONTHS' | translate }}
    </span>
  </div>

  <div class="d-flex align-items-center gap-2 text-muted fw-semibold">
    <span class="live-dot"></span>
    {{ 'DASHBOARD.FILTER.LIVE_VIEW' | translate }}
  </div>
</div>

<div class="card mb-8">
  <div class="card-body p-5 p-lg-6">
    <div class="row g-4 align-items-end">
      <div class="col-12 col-md-6 col-xl-3">
        <label class="form-label">{{ 'DASHBOARD.FILTER.START_DATE' | translate }}</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="filters.startDate"
          (ngModelChange)="clearActiveRange()"
        />
      </div>

      <div class="col-12 col-md-6 col-xl-3">
        <label class="form-label">{{ 'DASHBOARD.FILTER.END_DATE' | translate }}</label>
        <input
          type="date"
          class="form-control"
          [(ngModel)]="filters.endDate"
          (ngModelChange)="clearActiveRange()"
        />
      </div>

      <div class="col-12 col-md-6 col-xl-2">
        <label class="form-label">{{ 'DASHBOARD.FILTER.CUSTOMER_TYPE' | translate }}</label>

        <app-custom-select
          [size]="'lg'"
          [items]="customerTypeItems"
          bindLabel="label"
          bindValue="value"
          [clearable]="true"
          [placeholder]="'DASHBOARD.FILTER.SELECT' | translate"
          [(ngModel)]="filters.customerType"
        >
        </app-custom-select>
      </div>

      <div class="col-12 col-md-6 col-xl-2">
        <label class="form-label">{{ 'DASHBOARD.FILTER.CHANNEL' | translate }}</label>

        <app-custom-select
          [size]="'lg'"
          [items]="channelItems"
          bindLabel="label"
          bindValue="value"
          [clearable]="true"
          [placeholder]="'DASHBOARD.FILTER.SELECT' | translate"
          [(ngModel)]="filters.channel"
        >
        </app-custom-select>
      </div>

      <div class="col-12 col-xl-2">
        <div class="d-grid d-md-flex gap-3">
          <button class="btn btn-primary flex-fill" type="button" (click)="onFilter()">
            {{ 'DASHBOARD.FILTER.APPLY' | translate }}
          </button>

          <button class="btn btn-light flex-fill" type="button" (click)="onReset()">
            {{ 'DASHBOARD.FILTER.RESET' | translate }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
