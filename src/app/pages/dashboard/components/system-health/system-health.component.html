<div class="row g-4 g-md-5">
  <div class="col-12 col-md-6" *ngFor="let item of items">
    <div class="satdash__health-item">
      <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
        <div class="satdash__health-title">{{ item.name }}</div>
        <span [ngClass]="getStatusClass(item.status)">{{ item.status }}</span>
      </div>
      <div class="satdash__muted">{{ item.description }}</div>
    </div>
  </div>
</div>
