<div class="card card-flush h-100">
  <div class="card-header pt-7">
    <div class="card-title d-flex flex-column">
      <span class="card-label fw-bold text-gray-900 fs-3">{{ title }}</span>
      <span class="text-muted fw-semibold fs-7 mt-1">{{ subtitle }}</span>
    </div>

    <div *ngIf="chip" class="card-toolbar">
      <span class="badge fw-semibold px-3 py-2" [ngClass]="chipClass || 'badge-light-primary'">
        <span *ngIf="chipDot" class="bullet bullet-dot me-2" [ngClass]="chipDotClass"></span>
        <i *ngIf="chipIcon" [class]="chipIcon + ' me-1'"></i>
        {{ chip }}
      </span>
    </div>
  </div>

  <div class="card-body" [ngClass]="bodyClass">
    <ng-content></ng-content>
  </div>
</div>
