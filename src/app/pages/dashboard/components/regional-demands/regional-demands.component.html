<div class="d-flex flex-column gap-5">
  <div class="border border-dashed border-gray-300 rounded p-5" *ngFor="let demand of demands">
    <div class="d-flex justify-content-between align-items-start mb-5">
      <div class="pe-3">
        <div class="text-gray-900 fw-bold fs-6">{{ demand.regionName }}</div>
        <div class="text-muted fw-semibold fs-8 mt-1">{{ demand.requestedAt }}</div>
      </div>
      <span [ngClass]="getStatusClass(demand.status)">{{ demand.status }}</span>
    </div>

    <div class="separator separator-dashed mb-4"></div>

    <div class="row g-4 fs-7">
      <div class="col-7">
        <div class="text-muted fw-semibold mb-1">{{ 'DASHBOARD.DEMAND.CUSTOMER' | translate }}</div>
        <div class="text-gray-800 fw-bold">{{ demand.customerName }}</div>
      </div>
      <div class="col-5 text-end">
        <div class="text-muted fw-semibold mb-1">{{ 'DASHBOARD.DEMAND.AREA' | translate }}</div>
        <div class="text-gray-900 fw-bold">{{ demand.areaKm2 }} km²</div>
      </div>
    </div>
  </div>
</div>
