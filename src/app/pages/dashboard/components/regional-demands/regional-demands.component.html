<div class="d-flex flex-column gap-4">
  <div class="card" *ngFor="let demand of demands">
    <div class="card-body p-4">

      <!-- HEADER -->
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
          <div class="fw-bold text-white fs-6">
            {{ demand.regionName }}
          </div>
          <div class="text-muted fs-8 mt-1">
            {{ demand.requestedAt }}
          </div>
        </div>

        <span [ngClass]="getStatusClass(demand.status)">
          {{ demand.status }}
        </span>
      </div>

      <!-- CONTENT -->
      <div class="row g-3 fs-7">
        <div class="col-6">
          <div class="text-muted">
            {{ 'DASHBOARD.DEMAND.CUSTOMER' | translate }}
          </div>
          <div class="fw-semibold text-white">
            {{ demand.customerName }}
          </div>
        </div>

        <div class="col-6">
          <div class="text-muted">
            {{ 'DASHBOARD.DEMAND.AREA' | translate }}
          </div>
          <div>
            {{ demand.areaKm2 }} km²
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
