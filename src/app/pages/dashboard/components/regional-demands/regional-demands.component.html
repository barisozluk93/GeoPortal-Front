<div class="satdash__demand-list">
  <div class="satdash__demand-item" *ngFor="let demand of demands">
    <div class="d-flex justify-content-between align-items-start mb-3 gap-3">
      <div>
        <div class="satdash__demand-title">{{ demand.regionName }}</div>
        <div class="satdash__muted fs-8 mt-1">{{ demand.requestedAt }}</div>
      </div>
      <span [ngClass]="getStatusClass(demand.status)">{{ demand.status }}</span>
    </div>

    <div class="satdash__demand-meta">
      <div class="satdash__demand-meta-item">
        <span class="label">Müşteri</span>
        <span class="value">{{ demand.customerName }}</span>
      </div>
      <div class="satdash__demand-meta-item">
        <span class="label">Alan</span>
        <span class="value">{{ demand.areaKm2 }} km²</span>
      </div>
    </div>
  </div>
</div>
