<div class="row g-5 g-xl-8">
  <div class="col-12 col-sm-6 col-xl" *ngFor="let item of kpiItems">
    <div class="card card-flush h-100">
      <div class="card-body d-flex flex-column p-6">
        <div class="d-flex align-items-center justify-content-between mb-5">
          <div class="symbol symbol-50px">
            <div class="symbol-label" [ngClass]="item.bgClass">
              <i [ngClass]="[item.icon, 'fs-2x', item.textClass]"></i>
            </div>
          </div>

          <span class="badge badge-light" [ngClass]="item.badgeClass">
            {{ item.badge | translate }}
          </span>
        </div>

        <div class="fs-2hx fw-bold text-gray-900 lh-1 mb-2">
          {{ item.format === 'currency' ? formatCurrency(item.value) : formatNumber(item.value) }}
        </div>

        <div class="fs-7 fw-bold text-gray-700 text-uppercase mb-1">
          {{ item.title | translate }}
        </div>

        <div class="fs-8 fw-semibold text-muted mt-auto">
          {{ item.sub | translate }}
        </div>
      </div>
    </div>
  </div>
</div>
