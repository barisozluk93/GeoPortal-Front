<!-- splash screen -->
<div #splashScreen id="splash-screen">
  <img [src]="('LANG' | translate) === 'tr'
    ? './assets/media/logos/tusas_logo_tr.png'
    : './assets/media/logos/tusas_logo_eng.png'" alt="GeoPortal" class="w-100" />
  <svg class="splash-spinner" viewBox="0 0 50 50">
    <circle
      class="path"
      cx="25"
      cy="25"
      r="20"
      fill="none"
      stroke-width="5"
    ></circle>
  </svg>
</div>
