<div class="basket-card" (click)="showBasket()">
  <div class="basket-left">
    <div class="basket-icon-box">
      <i
        [inlineSVG]="'./assets/media/icons/duotune/ecommerce/ecm001.svg'"
        class="svg-icon basket-icon"
      ></i>

      <span *ngIf="basket?.length" class="basket-badge">
        {{ basket.length }}
      </span>
    </div>

    <span class="basket-total">{{ total | currency:'₺':'symbol' }}</span>
  </div>
</div>
