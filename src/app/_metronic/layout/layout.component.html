<div class="d-flex flex-column flex-root">
  <div class="page d-flex flex-row flex-column-fluid">
    <app-aside [isAdmin]="isAdmin" [asideDisplay]="asideDisplay" id="kt_aside" [ngClass]="asideCSSClasses"
      data-kt-drawer="true" data-kt-drawer-name="aside" data-kt-drawer-activate="{default: true, lg: false}"
      data-kt-drawer-overlay="true" data-kt-drawer-direction="start" data-kt-drawer-width="auto"
      data-kt-drawer-toggle="#kt_aside_toggle"></app-aside>

    <div class="wrapper d-flex flex-column flex-row-fluid" id="kt_wrapper">
      <app-header id="kt_header" class="header" [ngClass]="[headerCSSClasses,
      isLandingMapPage ? 'landing-map-mode' : '']"
        [isMobile]="isMobile"
        #ktHeader data-kt-sticky="true" data-kt-sticky-name="header">
      </app-header>


      <div id="kt_content" class="content d-flex flex-column flex-column-fluid">
        <app-alert #alert></app-alert>
        <app-content id="kt_content_container" [ngClass]="contentContainerClasses">
        </app-content>
      </div>  
      <!-- <app-footer class="footer d-flex flex-lg-column" [ngClass]="footerCSSClasses" id="kt_footer"></app-footer> -->
    </div>
  </div>
</div>

<app-scripts-init></app-scripts-init>
<scroll-top></scroll-top>
