<div
  class="scroll-top-wrapper"
  [ngClass]="{ 'show-scrollTop': windowScrolled }"
>
  <button
    type="button"
    class="scroll-top-btn"
    aria-label="Scroll to top"
    (click)="scrollToTop()"
  >
    <span class="scroll-top-btn__bg"></span>

    <span class="scroll-top-btn__icon">
      <i class="fas fa-chevron-up"></i>
    </span>
  </button>
</div>
