<div class="topbar d-flex align-items-center h-100">

  <!-- Basket -->
  <app-basket
    *ngIf="!isAdmin"
    class="topbar-item d-flex align-items-center h-100"
  ></app-basket>

  <!-- Login -->
  <div
    *ngIf="!isCurrentUserExist"
    class="topbar-item d-flex align-items-center h-100"
  >
    <button
      type="button"
      class="btn btn-sm btn-primary h-42px px-5 fw-bold"
      (click)="routeToLogin()"
    >
      {{ 'LOG_IN' | translate }}
    </button>
  </div>

  <!-- Language -->
  <div
    *ngIf="!isCurrentUserExist"
    id="kt_header_language_menu_toggle"
    class="topbar-item language-menu-wrapper d-flex align-items-center h-100"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="btn btn-icon btn-active-light-primary w-42px h-42px language-trigger"
      [class.active]="isLanguageMenuOpen"
      [attr.aria-expanded]="isLanguageMenuOpen"
      aria-haspopup="menu"
      [title]="'LANGUAGE' | translate"
      (click)="toggleLanguageMenu($event)"
    >
      <span class="symbol symbol-30px">
        <img
          *ngIf="language?.flag"
          [src]="language.flag"
          [alt]="'LANGUAGE' | translate"
        />
      </span>
    </button>

    <app-language-inner
      class="language-dropdown menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg-light-primary fw-semibold py-2 w-200px"
      [class.show]="isLanguageMenuOpen"
      [attr.aria-hidden]="!isLanguageMenuOpen"
      (click)="closeLanguageMenu()"
    ></app-language-inner>
  </div>

  <!-- Notifications -->
  <div
    *ngIf="isCurrentUserExist"
    id="kt_header_notification_menu_toggle"
    class="topbar-item notification-menu-wrapper d-flex align-items-center h-100"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="btn btn-icon btn-active-light-primary w-42px h-42px position-relative topbar-action"
      [class.active]="isNotificationMenuOpen"
      [ngClass]="{ 'is-animating': isNotificationAnimating }"
      [attr.aria-expanded]="isNotificationMenuOpen"
      aria-haspopup="menu"
      [title]="'NOTIFICATIONS' | translate"
      (click)="toggleNotificationMenu($event)"
    >
      <i
        class="fa-bell fs-3"
        [ngClass]="unreadedNotificationCount > 0
          ? 'fa-solid text-primary'
          : 'fa-regular text-gray-700'"
      ></i>

      <span
        *ngIf="unreadedNotificationCount > 0"
        class="position-absolute topbar-badge badge badge-circle badge-danger fw-bold"
      >
        {{ unreadedNotificationCount > 99 ? '99+' : unreadedNotificationCount }}
      </span>
    </button>

    <app-notifications-inner
      class="notification-dropdown menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg-light-primary fw-semibold w-400px"
      [class.show]="isNotificationMenuOpen"
      [attr.aria-hidden]="!isNotificationMenuOpen"
      [notifications]="notifications"
      [totalNotificationCount]="totalNotificationCount"
      [unreadedNotificationCount]="unreadedNotificationCount"
    ></app-notifications-inner>
  </div>

  <!-- User -->
  <div
    *ngIf="isCurrentUserExist"
    id="kt_header_user_menu_toggle"
    class="topbar-item user-menu-wrapper d-flex align-items-center h-100"
    (click)="$event.stopPropagation()"
  >
    <button
      type="button"
      class="btn btn-icon btn-active-light-primary w-42px h-42px p-0 topbar-user"
      [class.active]="isUserMenuOpen"
      [attr.aria-expanded]="isUserMenuOpen"
      aria-haspopup="menu"
      [title]="'USER_PROFILE' | translate"
      (click)="toggleUserMenu($event)"
    >
      <ng-container
        *ngIf="user?.fileId != null && user?.fileResult?.fileContents; else defaultUserIcon"
      >
        <span class="symbol symbol-38px">
          <img
            [src]="user?.fileResult?.fileContents"
            [alt]="'USER_PROFILE' | translate"
          />
        </span>
      </ng-container>

      <ng-template #defaultUserIcon>
        <span class="symbol symbol-38px">
          <span class="symbol-label bg-light-primary">
            <i class="fa-solid fa-user text-primary fs-3"></i>
          </span>
        </span>
      </ng-template>
    </button>

    <app-user-inner
      class="user-dropdown menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-gray-800 menu-state-bg-light-primary fw-semibold py-4 w-275px"
      [class.show]="isUserMenuOpen"
      [attr.aria-hidden]="!isUserMenuOpen"
    ></app-user-inner>
  </div>

</div>
