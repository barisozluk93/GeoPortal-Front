<!--begin::Menu-->
<div
  class="menu menu-column menu-rounded fw-semibold fs-6 modern-menu"
  id="kt_aside_menu"
  data-kt-menu="true"
>
  <div id="kt_aside_menu_wrapper" class="modern-menu-wrapper">
    <ng-container *ngFor="let menu of menuList">
      <!-- Single menu item -->
      <div
        *ngIf="menu.childMenus?.length == 0 && !menu.isForbid"
        class="menu-item"
      >
        <a
          class="menu-link without-sub"
          [routerLink]="menu.url"
          routerLinkActive="active"
        >
          <span class="menu-icon">
            <span
              [inlineSVG]="'./assets/media/icons/duotune/general/gen022.svg'"
              class="svg-icon svg-icon-2"
            ></span>
          </span>

          <span class="menu-title">
            {{ ("LANG" | translate) === 'tr' ? menu.name : menu.nameEn }}
          </span>
        </a>
      </div>

      <!-- Accordion menu item -->
      <div
        *ngIf="menu.childMenus && menu.childMenus.length > 0 && !menu.isForbid"
        class="menu-item menu-accordion"
        data-kt-menu-trigger="click"
        routerLinkActive="here show"
      >
        <span class="menu-link">
          <span class="menu-icon">
            <span
              class="svg-icon svg-icon-2"
              [inlineSVG]="'./assets/media/icons/duotune/general/gen022.svg'"
            ></span>
          </span>

          <span class="menu-title">
            {{ ("LANG" | translate) === 'tr' ? menu.name : menu.nameEn }}
          </span>

          <span class="menu-arrow"></span>
        </span>

        <ng-container *ngFor="let childMenu of menu.childMenus">
          <div
            *ngIf="!childMenu.isForbid"
            class="menu-sub menu-sub-accordion"
          >
            <div class="menu-item">
              <a
                class="menu-link without-sub"
                routerLinkActive="active"
                [routerLink]="childMenu.url"
              >
                <span class="menu-bullet">
                  <span class="bullet bullet-dot"></span>
                </span>

                <span class="menu-title">
                  {{ ("LANG" | translate) === 'tr' ? childMenu.name : childMenu.nameEn }}
                </span>
              </a>
            </div>
          </div>
        </ng-container>
      </div>
    </ng-container>

    <div class="menu-item">
      <div class="menu-content">
        <div class="separator mx-1 my-5 opacity-25"></div>
      </div>
    </div>
  </div>
</div>
<!--end::Menu-->
