<div
  class="modern-tabs-aside hover-scroll-y"
  data-kt-scroll="true"
  data-kt-scroll-activate="{default: false, lg: true}"
  data-kt-scroll-height="auto"
  data-kt-scroll-wrappers="#kt_aside_nav"
  data-kt-scroll-dependencies="#kt_aside_logo, #kt_aside_footer"
  data-kt-scroll-offset="0px"
>
  <ul class="modern-tabs-nav" id="kt_aside_nav_tabs">
    <li
      *ngFor="let tab of allTabs"
      class="modern-tabs-item"
      [title]="tab.tooltip"
      [ngbTooltip]="tab.tooltip"
      placement="end"
    >
      <a
        class="modern-tabs-link"
        (click)="setActiveTab(tab.link)"
        [ngClass]="{
          active: tab.link === activeTab.link
        }"
      >
        <span
          [inlineSVG]="tab.icon"
          class="svg-icon svg-icon-2"
        ></span>
      </a>
    </li>
  </ul>
</div>

<style>
  :host {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100%;
  background: #ffffff !important;
}

/* =========================================================
   ROOT
========================================================= */

.modern-tabs-aside {
  width: 100%;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
  background: #ffffff !important;
  padding: 0.75rem 0;
}

/* =========================================================
   NAV
========================================================= */

.modern-tabs-nav {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  padding: 0;
  margin: 0;
  list-style: none;
}

/* =========================================================
   ITEM
========================================================= */

.modern-tabs-item {
  width: 100%;
  display: flex;
  justify-content: center;
}

/* =========================================================
   LINK
========================================================= */

.modern-tabs-link {
  width: 52px;
  height: 52px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #ffffff !important;
  border: 1px solid #e5e7eb !important;
  color: #000000 !important;
  cursor: pointer;
  transition: all 0.2s ease;
  text-decoration: none !important;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
}

.modern-tabs-link:hover {
  background: #f3f4f6 !important;
  border-color: #d1d5db !important;
  transform: translateY(-1px);
}

.modern-tabs-link.active {
  background: #000000 !important;
  border-color: #000000 !important;
  color: #ffffff !important;
  box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
}

/* =========================================================
   ICON
========================================================= */

.modern-tabs-link .svg-icon {
  width: 22px;
  height: 22px;
  color: inherit !important;
}

.modern-tabs-link .svg-icon svg {
  width: 100%;
  height: 100%;
}

.modern-tabs-link .svg-icon svg path {
  fill: currentColor !important;
}

/* =========================================================
   ACTIVE ICON
========================================================= */

.modern-tabs-link.active .svg-icon,
.modern-tabs-link.active .svg-icon svg,
.modern-tabs-link.active .svg-icon path {
  color: #ffffff !important;
  fill: #ffffff !important;
}

/* =========================================================
   SCROLLBAR
========================================================= */

.modern-tabs-aside::-webkit-scrollbar {
  width: 5px;
}

.modern-tabs-aside::-webkit-scrollbar-thumb {
  background: #d1d5db;
  border-radius: 999px;
}

.modern-tabs-aside::-webkit-scrollbar-track {
  background: transparent;
}

/* =========================================================
   RESPONSIVE
========================================================= */

@media (max-width: 991px) {
  .modern-tabs-link {
    width: 46px;
    height: 46px;
    border-radius: 12px;
  }

  .modern-tabs-link .svg-icon {
    width: 20px;
    height: 20px;
  }
}
</style>
